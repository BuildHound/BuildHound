# Reusable steps template for Azure Pipelines (spec §7).
# Usage from a consumer pipeline:
#
#   steps:
#     - template: btp-gradle-steps.yml@btp
#       parameters:
#         gradleTasks: "assembleDebug"
#         btpServerUrl: "https://btp.example.com"
#
# Scaffold version: wires the token + runs Gradle. Phase 1 adds gradle.properties
# validation, HTML-artifact publishing, and the optional verdict gate.

parameters:
  - name: gradleTasks
    type: string
    default: "build"
  - name: btpServerUrl
    type: string
    default: ""

steps:
  - script: ./gradlew ${{ parameters.gradleTasks }}
    displayName: "Gradle build (with build telemetry)"
    env:
      # Map the secret in the consuming pipeline; never echo it.
      BTP_TOKEN: $(BTP_TOKEN)
      BTP_SERVER_URL: ${{ parameters.btpServerUrl }}
