# Reusable steps template for Azure Pipelines (spec §7).
# Usage from a consumer pipeline:
#
#   steps:
#     - template: buildhound-gradle-steps.yml@buildhound
#       parameters:
#         gradleTasks: "assembleDebug"
#         buildhoundServerUrl: "https://buildhound.example.com"
#         verdictGate: "warn"          # off | warn | fail
#         validateWrapper: "fail"      # off | warn | fail (plan 066)
#         expectedWrapperJarSha256: "" # optional: pin gradle-wrapper.jar to a known-good hash
#
# Optionally runs a preventive wrapper-integrity check FIRST (plan 066, off by default), then runs
# Gradle with telemetry wired, then optionally polls the per-build regression verdict (plan 025) and
# warns or fails the pipeline. The token is mapped from a pipeline secret and only ever leaves via an
# Authorization header — never echoed.

parameters:
  - name: gradleTasks
    type: string
    default: "build"
  - name: buildhoundServerUrl
    type: string
    default: ""
  # off = no gate; warn = log a warning on a FAIL verdict; fail = fail the pipeline on FAIL.
  - name: verdictGate
    type: string
    default: "off"
    values:
      - "off"
      - "warn"
      - "fail"
  # Preventive wrapper-integrity check (plan 066, research F16), run BEFORE ./gradlew. The default
  # (grep) path is a PINNING-PRESENCE check only — it confirms gradle-wrapper.properties declares a
  # non-empty distributionSha256Sum=, i.e. that pinning is turned on. It does NOT verify that
  # gradle-wrapper.jar actually matches that pin, or that gradlew/gradlew.bat are untampered — for
  # that, also set expectedWrapperJarSha256. Network-free, no token — this is the "narrowing 2"
  # preventive half; the plugin's own wrapperJarSha256 telemetry (detective, computed inside the JVM
  # the wrapper already launched) is the other half.
  - name: validateWrapper
    type: string
    default: "off"
    values:
      - "off"
      - "warn"
      - "fail"
  # Optional known-good SHA-256 of gradle-wrapper.jar; empty skips the jar-hash comparison (case-
  # insensitive compare). This is the only piece of the check that verifies actual jar bytes, and
  # it's only as trustworthy as where the value comes from: it MUST be sourced from OUTSIDE the
  # repo being verified (e.g. a protected variable group), never read from a file in the same
  # checkout — an attacker who can edit gradle-wrapper.jar in that checkout can just as easily edit
  # a same-repo "known-good" hash alongside it, defeating the pin. Coverage boundary: this checks
  # gradle-wrapper.jar's bytes and the properties pinning key only — the gradlew/gradlew.bat
  # launcher scripts themselves are NOT covered by either check.
  - name: expectedWrapperJarSha256
    type: string
    default: ""

steps:
  - ${{ if ne(parameters.validateWrapper, 'off') }}:
      - script: |
          set -eu
          props="gradle/wrapper/gradle-wrapper.properties"
          jar="gradle/wrapper/gradle-wrapper.jar"
          gradlew="./gradlew"
          issues=0

          if [ ! -f "$props" ]; then
            if [ -f "$gradlew" ]; then
              echo "buildhound: $props not found but $gradlew exists — this repo uses the Gradle wrapper but its properties file is missing"
              issues=$((issues + 1))
            else
              echo "buildhound: $gradlew not found; this repo does not use the Gradle wrapper — skipping wrapper-integrity check"
            fi
          elif grep -q '^distributionSha256Sum=..*' "$props"; then
            echo "buildhound: wrapper distributionSha256Sum is pinned"
          else
            echo "buildhound: wrapper is NOT pinned (no non-empty distributionSha256Sum= in $props) — this is a pinning-PRESENCE check only, not a jar-integrity check; set expectedWrapperJarSha256 for that"
            issues=$((issues + 1))
          fi

          expected="${BUILDHOUND_EXPECTED_WRAPPER_JAR_SHA256:-}"
          if [ -n "$expected" ]; then
            if [ ! -f "$jar" ]; then
              echo "buildhound: $jar not found; cannot verify its SHA-256"
              issues=$((issues + 1))
            else
              if command -v sha256sum >/dev/null 2>&1; then
                actual=$(sha256sum "$jar" | awk '{print $1}')
              elif command -v shasum >/dev/null 2>&1; then
                actual=$(shasum -a 256 "$jar" | awk '{print $1}')
              else
                actual=""
              fi
              if [ -z "$actual" ]; then
                echo "buildhound: neither sha256sum nor shasum is available on this agent; cannot verify gradle-wrapper.jar SHA-256"
                issues=$((issues + 1))
              else
                actual_lc=$(printf '%s' "$actual" | tr '[:upper:]' '[:lower:]')
                expected_lc=$(printf '%s' "$expected" | tr '[:upper:]' '[:lower:]')
                if [ "$actual_lc" = "$expected_lc" ]; then
                  echo "buildhound: gradle-wrapper.jar SHA-256 matches the expected value"
                else
                  echo "buildhound: gradle-wrapper.jar SHA-256 mismatch (expected $expected, got $actual)"
                  issues=$((issues + 1))
                fi
              fi
            fi
          fi

          if [ "$issues" -gt 0 ]; then
            if [ "${{ parameters.validateWrapper }}" = "fail" ]; then
              echo "##vso[task.logissue type=error]BuildHound wrapper-integrity check found $issues issue(s)"
              exit 1
            fi
            echo "##vso[task.logissue type=warning]BuildHound wrapper-integrity check found $issues issue(s)"
          fi
        displayName: "BuildHound wrapper-integrity check (${{ parameters.validateWrapper }})"
        env:
          BUILDHOUND_EXPECTED_WRAPPER_JAR_SHA256: ${{ parameters.expectedWrapperJarSha256 }}

  - script: ./gradlew ${{ parameters.gradleTasks }}
    displayName: "Gradle build (with build telemetry)"
    env:
      # Map the secret in the consuming pipeline; never echo it.
      BUILDHOUND_TOKEN: $(BUILDHOUND_TOKEN)
      BUILDHOUND_SERVER_URL: ${{ parameters.buildhoundServerUrl }}

  - ${{ if ne(parameters.verdictGate, 'off') }}:
      - script: |
          set -eu
          payload="build/buildhound/build-payload.json"
          if [ ! -f "$payload" ]; then echo "buildhound: no payload written; skipping verdict gate"; exit 0; fi
          build_id=$(sed -n 's/.*"buildId"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$payload" | head -n1)
          if [ -z "$build_id" ]; then echo "buildhound: no buildId in payload; skipping"; exit 0; fi
          # The verdict is computed post-ingest, so poll briefly for it to appear.
          status=""
          i=0
          while [ "$i" -lt 10 ]; do
            body=$(curl -s -H "Authorization: Bearer $BUILDHOUND_TOKEN" "${BUILDHOUND_SERVER_URL%/}/v1/builds/$build_id/verdict" || echo "")
            status=$(printf '%s' "$body" | sed -n 's/.*"status"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)
            if [ -n "$status" ]; then break; fi
            i=$((i + 1)); sleep 2
          done
          echo "buildhound verdict: ${status:-unknown}"
          if [ "$status" = "FAIL" ]; then
            if [ "${{ parameters.verdictGate }}" = "fail" ]; then
              echo "##vso[task.logissue type=error]BuildHound flagged a regression against baseline"
              exit 1
            fi
            echo "##vso[task.logissue type=warning]BuildHound flagged a regression against baseline"
          fi
        displayName: "BuildHound verdict gate (${{ parameters.verdictGate }})"
        env:
          BUILDHOUND_TOKEN: $(BUILDHOUND_TOKEN)
          BUILDHOUND_SERVER_URL: ${{ parameters.buildhoundServerUrl }}
