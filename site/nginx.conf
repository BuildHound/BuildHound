worker_processes auto; pid /tmp/nginx.pid; error_log /dev/stderr warn;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types; default_type application/octet-stream; server_tokens off; absolute_redirect off; etag on;
  access_log /dev/stdout; client_body_temp_path /tmp/client; proxy_temp_path /tmp/proxy; fastcgi_temp_path /tmp/fastcgi; uwsgi_temp_path /tmp/uwsgi; scgi_temp_path /tmp/scgi;
  map $http_x_forwarded_proto $hsts { default ""; https "max-age=31536000; includeSubDomains"; }
  server { listen 8080 default_server; server_name _; return 444; }
  server { listen 8080; server_name __SITE_HOST__;
    root /tmp/html; index index.html;
    add_header Content-Security-Policy "default-src 'none'; style-src 'self'; font-src 'self'; img-src 'self'; script-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header Referrer-Policy no-referrer always; add_header X-Content-Type-Options nosniff always; add_header X-Frame-Options DENY always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always; add_header Strict-Transport-Security $hsts always;
    add_header X-Robots-Tag "__ROBOTS__" always;
    location = /health { access_log off; default_type text/plain; return 200 'ok\n'; }
    location = /index.html { expires -1; try_files $uri =404; }
    location = / { expires -1; try_files /index.html =404; }
    location /assets/ {
      alias /usr/share/nginx/html/assets/;
      add_header Cache-Control "public, max-age=0, must-revalidate" always;
      add_header Content-Security-Policy "default-src 'none'; style-src 'self'; font-src 'self'; img-src 'self'; script-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
      add_header Referrer-Policy no-referrer always; add_header X-Content-Type-Options nosniff always; add_header X-Frame-Options DENY always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always; add_header Strict-Transport-Security $hsts always;
      add_header X-Robots-Tag "__ROBOTS__" always;
      try_files $uri =404;
    }
  }
}
