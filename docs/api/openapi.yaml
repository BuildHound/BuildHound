openapi: 3.1.0
info:
  title: BuildHound ingest & query API
  version: "1.0"
  description: >
    The BuildHound server API (spec §5). All routes are under `/v1` (except `/health`); `/v1` is the
    major-version prefix and the API is **additive within a major** — new fields/routes may appear, but
    existing shapes never break (mirroring the payload contract rule). Auth is a Bearer token whose
    scope gates the route: `ingest` (write telemetry), `read` (query history), `addon` (addon namespace),
    `admin` (retention/admin), `metrics` (Prometheus scrape egress, plan 070), or `all`. A missing token
    is `401`, a wrong scope `403`. Storage outages are `503`, oversized bodies `413`, malformed input
    `400`/`422`. This document is kept in lockstep with the live route table by `OpenApiContractTest`.
  license:
    name: Apache-2.0
servers:
  - url: /
    description: The BuildHound server root.
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        A per-project token. Scopes — `ingest`, `read`, `addon`, `admin`, `metrics`, `all`. The tenant is
        derived from the token, never the request body, so a token can only ever act on its own project.
  responses:
    Unauthorized:
      description: Missing or unknown bearer token.
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    Forbidden:
      description: The token's scope does not permit this operation.
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
    Unavailable:
      description: Storage unavailable (transient) — safe to retry.
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } }
  schemas:
    ApiError:
      type: object
      properties:
        error: { type: string }
      required: [error]
  parameters:
    ProjectKey:
      name: projectKey
      in: query
      required: false
      description: >
        Filter to one payload `projectKey` (plan 077) — the root project name a build reported, distinct
        from the tenant. Omit for all projects (unchanged behavior). Length-capped at 256; longer is 400.
      schema: { type: string, maxLength: 256 }
paths:
  /health:
    get:
      summary: Liveness probe.
      security: []
      responses:
        "200": { description: The server is up. }
  /v1/builds:
    post:
      summary: Ingest a build payload (gzip-compressed BuildPayload JSON).
      description: >
        Ingest scope. Body is size-capped; a malformed payload is 422, an oversized body 413.
        Identifier-like strings (buildId, branch, ci provider/runId/pipelineName, module names — 256
        chars; task types/test class names — 512; sha — 64) are truncated to server bounds at storage.
      responses:
        "202": { description: Accepted and stored (or a duplicate build id, idempotent). }
        "400": { description: Malformed request. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "413": { description: Payload too large. }
        "422": { description: The payload failed schema validation. }
        "503": { $ref: '#/components/responses/Unavailable' }
    get:
      summary: List builds (newest first), filterable by branch/mode/outcome/projectKey.
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: A page of build summaries. }
        "400": { description: Invalid filter (e.g. over-long projectKey or branch — both capped at 256 chars). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/project-keys:
    get:
      summary: Distinct payload projectKeys for this tenant (plan 077), newest-activity first.
      description: >
        The dashboard's project selector. Read scope, tenant-scoped. Each row is projectKey + its build
        count + last-build epoch-ms. Empty when no build reported a non-null projectKey. Capped at 100
        rows; truncation drops the longest-idle keys first (newest-activity ordering).
      responses:
        "200": { description: The project-key rows. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/builds/{buildId}:
    get:
      summary: Fetch one build's full payload.
      parameters: [{ name: buildId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: The build payload. }
        "404": { description: No such build for this tenant. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/builds/{buildId}/verdict:
    get:
      summary: The regression verdict for a build (plan 025).
      parameters: [{ name: buildId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: The verdict (status + per-metric detail). }
        "404": { description: No verdict computed for this build. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/builds/{buildId}/ci-run:
    get:
      summary: The enriched CI pipeline timeline for a build (plans 028/041).
      parameters: [{ name: buildId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: Status + span tree + queue time + Gradle-share, or UNCONFIGURED. }
        "404": { description: No such build for this tenant. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/builds/{a}/compare/{b}:
    get:
      summary: Compare two builds (plan 038).
      parameters:
        - { name: a, in: path, required: true, schema: { type: string } }
        - { name: b, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: The build-to-build comparison. }
        "404": { description: One or both builds are absent for this tenant. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/builds/{buildId}/diagnosis:
    get:
      summary: Agent-facing synthesis of dominant phase, hit-rate-vs-target, top hotspots, deltas (plan 071), and daemon-tuning candidates (plan 065).
      description: >
        Pure serialization over already-collected signals (config-vs-execution split, cache hit rate vs
        the v1 constant target, top EXECUTED-task hotspots, and headline-metric deltas vs the stored
        verdict's comparable baseline) — no new collection. Every analytic field is independently
        nullable and degrades honestly rather than fabricating a signal. Since plan 065 the response
        also carries `tuningCandidates` — ranked, advisory daemon-tuning cards (GC pressure, Kotlin
        pinned -Xmx, ParallelGC-vs-G1 trial suggestion, JEP 519 compact object headers) over the
        build's process snapshot; empty when the probe collected nothing or no rule fired, and never
        auto-applied.
      parameters: [{ name: buildId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: The synthesized diagnosis. }
        "404": { description: No such build for this tenant. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/builds/{buildId}/parallelism:
    get:
      summary: Gating-task blockers + weighted-degree centrality candidates (plan 062, research F12).
      description: >
        Sweep-line gating-task detection over the core task timeline (always available, needs no opt-in
        module) plus duration-weighted degree centrality over the internal-adapters dependency-edge
        list. `centrality` is null and `centralityAvailable` is false — never a 500 — when the build
        carries no dependency edges (adapters off, isolated projects, or a capped-away extensions
        blob). Both rankings are candidates to investigate, not confirmed fixes.
      parameters: [{ name: buildId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: Gating blockers + an optional centrality ranking. }
        "404": { description: No such build for this tenant. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/builds/{buildId}/graph:
    get:
      summary: Dependency-graph export as GEXF or DOT (plan 062, research F12).
      description: >
        Exports the internal-adapters dependency-edge list as a GEXF (default) or DOT graph, every
        task-path label escaped for its target format (architecture §6 — task paths are project-internal
        identifiers, but still ride unsanitized into a downstream graph tool). The plan-038 ≤2000-edge cap
        is enforced client-side and only bounds a compliant plugin; the actual bound against a hostile
        ingester is the server-side PayloadCapper maxExtensionsBytes=256KiB re-cap applied at ingest. 404
        when the build carries no dependency edges.
      parameters:
        - { name: buildId, in: path, required: true, schema: { type: string } }
        - { name: format, in: query, required: false, schema: { type: string, enum: [gexf, dot], default: gexf } }
      responses:
        "200": { description: The exported graph (application/xml for gexf, text/vnd.graphviz for dot). }
        "400": { description: Unsupported format value. }
        "404": { description: No such build for this tenant, or the build carries no dependency edges. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/builds/{buildId}/recommendations:
    get:
      summary: Per-build ranked recommendations (plan 054, research F4).
      description: >
        The same pure rule-based recommendations engine as `/v1/rollups/recommendations`, run over this
        one build (a one-element window). Five families — hygiene/threshold (configuration cache off,
        cacheable-hit rate below target, daemon GC pressure), KAPT tax, Best-Practices conformance
        (BP-CC-ENABLE / BP-KSP-OVER-KAPT), a Gradle-10 readiness card, and wasted work (the habitual
        `-x test`-on-CI smell, local verification/packaging share). Every recommendation is a ranked
        candidate, never a confirmed fix; each carries a MEASURED or ESTIMATED origin so hedged blog /
        JDK-floor numbers stay honest. Tenant-scoped like `/verdict` and `/diagnosis`: a foreign/unknown
        build reads as 404. A clean build 200s with an empty list, never an error.
      parameters: [{ name: buildId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: Ranked recommendations for this build (possibly empty). }
        "404": { description: No such build for this tenant. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/trends:
    get:
      summary: Fleet duration/cache trend points over a window.
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: Trend points. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/artifacts/trends:
    get:
      summary: Android artifact-size trend points (plan 031).
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: Artifact-size trend points. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/benchmark/series:
    get:
      summary: Benchmark-mode series (plan 030); workersMax slicing since plan 065.
      parameters:
        - { name: scenario, in: query, schema: { type: string }, description: Narrow to one scenario. }
        - { name: isolationMode, in: query, schema: { type: string }, description: Narrow to one isolation mode. }
        - { name: branch, in: query, schema: { type: string }, description: Narrow to one branch. }
        - name: workersMax
          in: query
          schema: { type: integer }
          description: >
            Slice to builds whose plaintext `environment.workersMax` equals this value (plan 065).
            A build that never carried the field matches no filter; a non-integer value is ignored.
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: Benchmark series points. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/flaky:
    get:
      summary: Flaky test classes over a window (plan 036).
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: Flaky records. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/trends/cohorts:
    get:
      summary: Split a trend by a tag's distinct values, with a cohort-vs-cohort delta (plan 057, research F7).
      description: >
        Per-cohort daily trend series (grouped by the `tag` query param's key) plus a median-delta /
        %-change / robust-z verdict for each cohort against the largest (most stable) cohort. Cohorts
        are capped to the top 6 by sample count; a cohort under the baseline minimum reads
        `INSUFFICIENT_DATA`, never a claimed delta. Benchmark builds excluded by default, same as
        `/v1/trends`. An unknown `tag` key returns an empty comparison (no cohorts), never a 404.
      parameters:
        - { name: tag, in: query, required: true, schema: { type: string }, description: The tag key to split by. }
      responses:
        "200": { description: The per-cohort series + delta comparison. }
        "400": { description: Missing tag parameter, or an invalid mode/outcome/tag filter. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/tags:
    get:
      summary: Distinct tag keys + capped top-N values each (plan 057).
      description: Populates the dashboard's split-by-tag picker. Benchmark builds excluded, days clamped like `/v1/trends`.
      responses:
        "200": { description: Tag keys with their most-frequent values. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/rollups/project-cost:
    get:
      summary: Project cost rollup (plan 026).
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: Project-cost rows. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/task-duration:
    get:
      summary: Task-duration rollup (plan 026).
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: The task-duration rollup. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/negative-avoidance:
    get:
      summary: Negative-avoidance rollup (plan 026).
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: Negative-avoidance rows. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/plugin-cost:
    get:
      summary: Owning-plugin cost rollup (plan 058, research F8 Layer 1).
      description: FQCN-prefix rollup over already-collected task types (zero new collection); days-window, benchmark-included, like `/v1/rollups/task-duration`.
      responses:
        "200": { description: Per-plugin task-time rows plus an honest availability flag. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/change-blast-radius:
    get:
      summary: Costliest-modules-to-change rollup (plan 063, research F13).
      description: >
        Ranks each changed Gradle module by the median downstream **executed** time it inflicts on
        *other* modules (`sum(duration_ms WHERE outcome=EXECUTED AND module != this)`) scaled by how
        often it changed — the cost-inflicted-on-others sibling of `/v1/rollups/project-cost` (which
        ranks a module by its own cost). Days-window, benchmark-included, like `/v1/rollups/project-cost`;
        top-25 by `blastScore`. An honest heuristic — a build changing several modules attributes the
        whole build's downstream time to each (shared/over-counted), a ranking signal not causal
        isolation. Empty when no windowed build carried a `changedModules` block.
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
      responses:
        "200": { description: Top-25 costliest-modules-to-change rows. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/bottlenecks:
    get:
      summary: Bottlenecks rollup (plan 032).
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: The bottlenecks rollup. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/toolchain:
    get:
      summary: Toolchain adoption rollup (plan 032); jdk grouped by major with p50 duration since plan 065.
      description: >
        Per-dimension version distribution + hashed distinct users + "who is behind". Since plan 065
        the `jdk` dimension groups by JDK **major** (leading numeric segment) and each of its rows
        carries `durationP50Ms` — the daemon-JDK fleet comparison ("your JDK 17 daemons are p50 X %
        slower than your JDK 21 daemons"). Other dimensions stay per full version with
        `durationP50Ms` null. Since plan 072 an additive `springBoot` dimension rides alongside
        agp/kgp/ksp (the server-service JVM analogue), read from the same `builds.payload` jsonb with
        no migration.
      parameters:
        - $ref: '#/components/parameters/ProjectKey'
      responses:
        "200": { description: The toolchain rollup. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/rerun-causes:
    get:
      summary: Rerun-cause taxonomy rollup (plan 061).
      responses:
        "200": { description: Per-bucket coverage of executed task-hours (overlapping), a build-level cascade rate, and an optional build-logic-storm candidate. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/delivery-health:
    get:
      summary: Delivery-health rollup — DORA proxies + the retry tax (plan 059, research F9).
      description: >
        Three DORA-style **proxies** over already-ingested build rows — zero new collection, no
        git-history or deployment mining (the spec-§1 Git/DORA non-goal holds): change-failure rate
        per (branch, pipeline) (CI failure share — the per-cohort refinement of the fleet
        `successRate`), time-to-green (a **CI-recovery** proxy, never production MTTR), and
        build-duration lead time — plus a retry-tax summary (rerun chains via GHA `runAttempt > 1`
        (authoritative) and a sequential same-`(projectKey, sha, requestedTasksSig)`-after-FAILED
        heuristic (labeled candidates), priced in CI minutes as an explicit **lower bound**).
        Queue-time/Gradle-share lead-time columns and pipeline-wall-clock rerun pricing populate only
        for connector-enriched builds (`connectorDataAvailable`); `flakyRerunTax` ranks flaky classes
        (plan 036) whose affected builds intersect the rerun set — candidates, not confirmed causes.
        Benchmark builds excluded, like `/v1/rollups/bottlenecks`.
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
      responses:
        "200": { description: The delivery-health rollup for the window. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/rollups/warnings:
    get:
      summary: Build-Analyzer-style warning taxonomy rollup (plan 060, research F10).
      description: >
        Three rule-based candidate families (ALWAYS_RUN / NON_INCREMENTAL_AP / DYNAMIC_DEBUG_VALUES)
        read straight from the payload jsonb — no `task_executions` column, no migration. Every row is
        a ranked candidate with its evidence share, never a confirmed fix.
      parameters:
        - { name: period, in: query, schema: { type: integer, default: 7, minimum: 1, maximum: 90 } }
      responses:
        "200": { description: Ranked warning candidates for the window. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/rollups/cache-miss-diagnostics:
    get:
      summary: Cache-miss diagnostics rollup (plan 068, research F18).
      description: >
        Non-relocatable-task candidates (self-gated on the plan-038 internal-adapters origin enum;
        `remoteCacheObserved=false` when the window never observed a `REMOTE_HIT`, an honest empty state
        rather than a false "relocatable" verdict) plus per-salt-stream fingerprint volatility scoring
        (plan 022), with credential/timestamp/run-id name-pattern notes over the allowlisted fingerprint
        key names only — never a matched value. Benchmark builds excluded, like `/v1/rollups/bottlenecks`.
        A stored build row whose payload fails to decode is silently skipped rather than surfaced as an
        error, so a 500 from malformed data is impossible here — only a storage outage 503s.
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
      responses:
        "200": { description: The cache-miss diagnostics rollup for the window. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/rollups/cache-roi:
    get:
      summary: Fleet remote-cache ROI rollup (plan 067, research F17).
      description: >
        Per-build-mode remote/local cache-hit rate from the opt-in plan-038 internal-adapters origin
        (denominator `LOCAL_HIT+REMOTE_HIT+MISS`, excluding `STORED` — a cold first store is not missed
        reuse), plus a config-snapshot summary (share of window builds that configured an enabled remote,
        from the always-on plan-067 `environment.buildCache`) and a ranked near-zero-CI-reuse candidate.
        Two-tier: with the opt-in module off there is no remote-hit rate at all — `remoteHitRateAvailable`
        is false and the rollup degrades to the config-snapshot summary (never synthesizing a rate from
        `cacheableHitRate`). The candidate is gated on a configured remote so it never fires on an
        unconfigured fleet, and reads as an investigate-prompt, never a verdict (cold/first-build CI
        legitimately shows near-zero reuse). Benchmark builds excluded, like `/v1/rollups/bottlenecks`.
        A stored build row whose payload fails to decode is silently skipped, so only a storage outage 503s.
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
      responses:
        "200": { description: The remote-cache ROI rollup for the window. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/rollups/cc-economics:
    get:
      summary: Configuration-cache economics + reuse diagnostics rollup (plan 064, research F14).
      description: >
        An advisory CI-reuse classification (`EPHEMERAL_CI_EXPECTED_ZERO` / `REUSE_HEALTHY` /
        `REUSE_DEGRADED` / `DISABLED` / `INSUFFICIENT_DATA`) — an annotation, never a "turn CC off" fix:
        F14's own guidance is to enable CC on CI for parallelism + early breakage and not focus on reuse,
        so a below-healthy reuse rate on a CI-dominant window reads as expected, not degraded. Plus p50
        store cost (`derived.configurationMs` on `MISS_STORED`), p50 CC entry-load proxy
        (`derived.ccLoadMs` on `HIT`), p50 CC entry size (`derived.ccEntrySizeBytes`), and flip-flop
        findings — a `MISS_STORED` whose salted `fingerprints.build` matches a strictly-earlier
        CC-requesting build within the same single-machine salt stream (the entry should have hit but was
        re-stored). Per-day CC reuse counters ride on `/v1/trends` instead. Benchmark builds excluded,
        like `/v1/rollups/bottlenecks`. A stored build row whose payload fails to decode is silently
        skipped, so only a storage outage 503s.
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
      responses:
        "200": { description: The CC-economics rollup for the window. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/rollups/recommendations:
    get:
      summary: Fleet rule-based recommendations rollup (plan 054, research F4).
      description: >
        Five rule-based recommendation families over the window's whole payloads — the store fetches the
        windowed builds, the route feeds the pure engine (the RegressionEngine discipline: store provides
        data, route runs the calculator). Families: hygiene/threshold (configuration cache disabled share,
        cacheable-hit rate below the v1 target, daemon GC pressure — the plan-065 gcTimeMs÷uptimeS proxy),
        KAPT tax (KAPT share of EXECUTED time + a hedged projected KSP saving, suppressed when the build is
        already on KSP), Best-Practices conformance (BP-CC-ENABLE, BP-KSP-OVER-KAPT; the remaining BP IDs
        reserved-dormant), a Gradle-10 readiness card (CC-disabled fraction + sub-JDK-21 daemons + optional
        internal-adapters deprecations), and wasted work (the habitual `-x test`-on-CI smell over the
        additive `excludedTaskNames`, plus local verification/packaging share). Every row is a ranked
        candidate, never a confirmed fix; each carries a MEASURED (observed fleet share) or ESTIMATED
        (hedged blog / expected-JDK-floor) origin. Read-scope, tenant-scoped, days clamped like `/v1/trends`;
        benchmark builds excluded, like `/v1/rollups/bottlenecks`. Empty (never an error) on no data; a
        stored build row whose payload fails to decode is silently skipped, so only a storage outage 503s.
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 30, minimum: 1, maximum: 365 } }
      responses:
        "200": { description: Ranked recommendations for the window (possibly empty). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/settings:
    get:
      summary: Read this project's regression settings (plan 025).
      responses:
        "200": { description: The project settings (defaults when no row). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    put:
      summary: Write this project's regression settings (all scope).
      responses:
        "200": { description: The stored settings. }
        "400": { description: Malformed settings JSON. }
        "413": { description: Settings body too large. }
        "422": { description: Settings failed validation. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/admin/retention:
    get:
      summary: Read this project's retention windows (plan 042). Admin scope.
      responses:
        "200": { description: The retention config (spec defaults when no row). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    put:
      summary: Write this project's retention windows. Admin scope.
      responses:
        "200": { description: The stored retention config. }
        "400": { description: Invalid windows (out of range or buildDays < rawDays). }
        "413": { description: Config body too large. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/metrics:
    post:
      summary: Ingest a custom measure from the metric CLI (plan 025). Ingest scope.
      description: >
        Scope/name/text/unit caps are enforced in code (422); correlation ids (buildId, provider,
        runId) are capped at 256 chars each (422) — rejected loudly, never clamped.
      responses:
        "202": { description: Accepted (idempotent on the correlation key). }
        "400": { description: Malformed metric. }
        "413": { description: Body too large. }
        "422": { description: The metric failed validation (caps, correlation). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/metrics/prometheus:
    get:
      summary: Prometheus text-exposition of this project's KPIs (plan 070, F20). Metrics scope (also read/all).
      description: >
        p50/p95 build duration, cache hit rate, success rate, windowed build counts, flaky-unit count,
        and avoided time for the token's own project only — never a global unauthenticated `/metrics`.
        A KPI with no underlying samples in the window omits its line rather than emitting a spurious
        `0`; the response is always valid exposition (still `200`) so a Prometheus target never reads
        "down". `days` narrows the window like the other rollups (default 30, clamped to [1, 365]).
      responses:
        "200":
          description: Prometheus text exposition (format 0.0.4) of this project's KPIs.
          content: { text/plain: { schema: { type: string } } }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "503": { $ref: '#/components/responses/Unavailable' }
  /v1/connectors/azure-devops/hook:
    post:
      summary: Azure DevOps build.complete service hook (plan 028). Ingest scope.
      description: The tenant is the token's; the outbound host is never taken from the hook body.
      responses:
        "202": { description: Accepted; enrichment is scheduled. }
        "400": { description: Unrecognized or invalid hook body. }
        "413": { description: Body too large. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/addons/test-sharding/plan:
    post:
      summary: Fetch/compute the idempotent shard plan for a CI run (plan 040). Ingest scope.
      responses:
        "200": { description: The shard plan for this reference. }
        "400": { description: Malformed request (reference blank or over 256 chars, index/total out of range). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/addons/{addonId}/data:
    get:
      summary: List an addon's stored keys (plan 039). Addon scope.
      parameters: [{ name: addonId, in: path, required: true, schema: { type: string } }]
      responses:
        "200": { description: The addon's key/value map for this tenant. }
        "404": { description: The addon id is not registered. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
  /v1/addons/{addonId}/data/{key}:
    get:
      summary: Read one addon value (plan 039). Addon scope.
      parameters:
        - { name: addonId, in: path, required: true, schema: { type: string } }
        - { name: key, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: The stored value. }
        "404": { description: No such key (or addon not registered). }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
    put:
      summary: Write one addon value (plan 039). Addon scope.
      parameters:
        - { name: addonId, in: path, required: true, schema: { type: string } }
        - { name: key, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: The stored value. }
        "400": { description: Malformed key or JSON body. }
        "404": { description: The addon id is not registered. }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
