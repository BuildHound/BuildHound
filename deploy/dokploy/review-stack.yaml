version: "3.8"
services:
  site:
    image: ${BUILDHOUND_SITE_IMAGE}
    user: "101:101"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      BUILDHOUND_SITE_DASHBOARD_URL: https://${BUILDHOUND_REVIEW_DASHBOARD_HOST}
      BUILDHOUND_SITE_NOINDEX: "true"
      BUILDHOUND_SITE_HOST: ${BUILDHOUND_REVIEW_SITE_HOST}
      BUILDHOUND_SITE_ROBOTS: noindex, nofollow
    read_only: true
    tmpfs: ["/tmp:size=32m,mode=1777"]
    networks: [review, ingress]
    deploy:
      resources:
        reservations: {cpus: "0.05", memory: 32M}
        limits: {cpus: "0.5", memory: 128M}
      labels:
        - buildhound.review.repository=${BUILDHOUND_REPOSITORY}
        - buildhound.review.pr=${BUILDHOUND_PR_NUMBER}
        - buildhound.review.sha=${BUILDHOUND_HEAD_SHA}
        - traefik.enable=true
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-site.rule=Host(`${BUILDHOUND_REVIEW_SITE_HOST}`)
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-site.entrypoints=websecure
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-site.tls.certresolver=letsencrypt
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-site.middlewares=${BUILDHOUND_REVIEW_PROVIDER_ID}-noindex
        - traefik.http.services.${BUILDHOUND_REVIEW_PROVIDER_ID}-site.loadbalancer.server.port=8080
  server:
    image: ${BUILDHOUND_SERVER_IMAGE}
    user: "10001:10001"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      BUILDHOUND_DB_URL: jdbc:postgresql://db:5432/buildhound
      BUILDHOUND_DB_USER: buildhound
      BUILDHOUND_DB_PASSWORD: ${BUILDHOUND_REVIEW_DB_PASSWORD}
      BUILDHOUND_BOOTSTRAP_PROJECT: review
      BUILDHOUND_BOOTSTRAP_TOKEN: ${BUILDHOUND_REVIEW_TOKEN}
      BUILDHOUND_HOST_RPM: "300"
    read_only: true
    tmpfs: ["/tmp:size=64m"]
    networks: [review, ingress]
    deploy:
      resources:
        reservations: {cpus: "0.1", memory: 128M}
        limits: {cpus: "1", memory: 1G}
      labels:
        - traefik.enable=true
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-server.rule=Host(`${BUILDHOUND_REVIEW_DASHBOARD_HOST}`)
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-server.entrypoints=websecure
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-server.tls.certresolver=letsencrypt
        - traefik.http.routers.${BUILDHOUND_REVIEW_PROVIDER_ID}-server.middlewares=${BUILDHOUND_REVIEW_PROVIDER_ID}-noindex
        - traefik.http.middlewares.${BUILDHOUND_REVIEW_PROVIDER_ID}-noindex.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow
        - traefik.http.services.${BUILDHOUND_REVIEW_PROVIDER_ID}-server.loadbalancer.server.port=8080
  db:
    image: timescale/timescaledb:latest-pg16@sha256:ba149561ad4ddff5940d6eb0a0df60aefd1355cee1a450928f271267038fc888
    environment:
      POSTGRES_DB: buildhound
      POSTGRES_USER: buildhound
      POSTGRES_PASSWORD: ${BUILDHOUND_REVIEW_DB_PASSWORD}
    networks: [review]
    deploy:
      resources:
        reservations: {cpus: "0.1", memory: 128M}
        limits: {cpus: "1", memory: 1G}
networks:
  review: {driver: overlay, internal: true, driver_opts: {encrypted: "true"}}
  ingress: {external: true, name: "${DOKPLOY_REVIEW_INGRESS_NETWORK}"}
