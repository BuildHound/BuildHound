# Self-host / local development stack (spec §5: one server image + Postgres/TimescaleDB).
#
#   docker compose -f deploy/compose.yaml up --build
#
# The scaffold server does not talk to the database yet (in-memory store); the service is
# provisioned here so phase 1 lands against a running TimescaleDB from day one.

name: buildhound

services:
  server:
    build:
      context: ..
      dockerfile: buildhound-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      BUILDHOUND_PORT: "8080"
      BUILDHOUND_DB_URL: "jdbc:postgresql://db:5432/buildhound"
      BUILDHOUND_DB_USER: "buildhound"
      # Local development only — use a secret manager for real deployments.
      BUILDHOUND_DB_PASSWORD: "buildhound-local-dev"
      # Pilot tenancy bootstrap (plan 009): creates the project + token hash on boot.
      # Local development only — real deployments must use a HIGH-ENTROPY token
      # (e.g. `openssl rand -hex 32`); tokens are stored as unsalted SHA-256, which
      # is only sound for random tokens.
      BUILDHOUND_BOOTSTRAP_PROJECT: "pilot"
      BUILDHOUND_BOOTSTRAP_TOKEN: "buildhound-local-dev-token"
      # Rate limits, requests/minute (plan 013); 0 disables. HOST_RPM is the outer
      # per-source-IP layer — it keys on the direct TCP peer, so behind a reverse
      # proxy ALL traffic shares one bucket: raise/disable it there (and never
      # install XForwardedHeaders without revisiting the limiter key).
      # BUILDHOUND_INGEST_RPM: "60"
      # BUILDHOUND_QUERY_RPM: "120"
      # BUILDHOUND_HOST_RPM: "600"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # CallLogging emits a line per request (incl. unlimited /health) — cap the log
    # files so a GET flood can't fill the disk.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  db:
    # Pin to a digest before any shared/production use.
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: "buildhound"
      POSTGRES_USER: "buildhound"
      POSTGRES_PASSWORD: "buildhound-local-dev"
    volumes:
      - buildhound-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildhound -d buildhound"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  buildhound-db-data:
