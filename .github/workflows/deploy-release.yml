name: Deploy immutable release
on:
  workflow_run:
    workflows: ["Publish deployment images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Production, or the one-time protected staging bootstrap
        type: choice
        options: [production, staging]
        required: true
      staging_run_id:
        description: Successful staging deployment run ID (production)
        required: false
      source_run_id:
        description: Successful main publish run ID (staging bootstrap only)
        required: false
      release_artifact:
        description: Exact release-SHA artifact (staging bootstrap only)
        required: false
      backup_object:
        description: Exact fresh encrypted backup object key
        required: false
      bootstrap_bom:
        description: First BOM after a verified manual deployment
        type: boolean
        default: false
      rollback_compatibility_attested:
        description: Candidate release rollback and migration state are proven compatible
        type: boolean
        default: false
permissions: {actions: read, contents: read, deployments: read, pull-requests: read, statuses: read}
concurrency:
  group: deploy-${{ github.event_name == 'workflow_run' && 'staging' || inputs.target }}
  queue: max
  cancel-in-progress: false
jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      eligible: ${{ steps.resolve.outputs.eligible }}
      target: ${{ steps.resolve.outputs.target }}
      mode: ${{ steps.resolve.outputs.mode }}
      source_run_id: ${{ steps.resolve.outputs.source_run_id }}
      source_commit: ${{ steps.resolve.outputs.source_commit }}
      release_artifact: ${{ steps.resolve.outputs.release_artifact }}
      review_run_id: ${{ steps.resolve.outputs.review_run_id }}
      review_attempt_id: ${{ steps.resolve.outputs.review_attempt_id }}
      review_pr: ${{ steps.resolve.outputs.review_pr }}
      review_sha: ${{ steps.resolve.outputs.review_sha }}
      proven_release_id: ${{ steps.resolve.outputs.proven_release_id }}
      bootstrap_bom: ${{ steps.resolve.outputs.bootstrap_bom }}
      rollback_compatible: ${{ steps.resolve.outputs.rollback_compatible }}
      staging_run_id: ${{ steps.resolve.outputs.staging_run_id }}
    steps:
      - id: resolve
        name: Resolve trusted promotion lineage without deployment secrets
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_SOURCE_RUN: ${{ github.event.workflow_run.id }}
          EVENT_SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_STAGING_RUN: ${{ inputs.staging_run_id }}
          INPUT_SOURCE_RUN: ${{ inputs.source_run_id }}
          INPUT_RELEASE_ARTIFACT: ${{ inputs.release_artifact }}
          INPUT_BACKUP_OBJECT: ${{ inputs.backup_object }}
          INPUT_BOOTSTRAP: ${{ inputs.bootstrap_bom }}
          INPUT_ROLLBACK: ${{ inputs.rollback_compatibility_attested }}
        run: |
          set -euo pipefail
          umask 077
          workdir=$(mktemp -d "${RUNNER_TEMP}/buildhound-promotion.XXXXXX")
          trap 'rm -rf -- "$workdir"' EXIT

          require_run_id() { [[ ${1-} =~ ^[1-9][0-9]*$ ]]; }
          require_sha() { [[ ${1-} =~ ^[0-9a-f]{40}$ ]]; }
          require_artifact() {
            local run_id=$1 name=$2 artifacts count
            artifacts=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/$run_id/artifacts?per_page=100") || return 1
            jq -e 'type == "object" and (.artifacts | type) == "array"' <<<"$artifacts" >/dev/null || return 1
            count=$(jq -er --arg name "$name" '[.artifacts[] | select(.name == $name and .expired == false)] | length' <<<"$artifacts") || return 1
            if [ "$count" -ne 1 ]; then return 42; fi
          }

          validate_publish_run() {
            local run_id=$1 expected_sha=${2-} run workflow_id
            require_run_id "$run_id"
            run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/$run_id")
            workflow_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/publish-deploy-images.yml" --jq .id)
            require_run_id "$workflow_id"
            test "$(jq -r .conclusion <<<"$run")" = success
            test "$(jq -r .workflow_id <<<"$run")" = "$workflow_id"
            test "$(jq -r .event <<<"$run")" = push
            test "$(jq -r .repository.full_name <<<"$run")" = "$GITHUB_REPOSITORY"
            test "$(jq -r .head_branch <<<"$run")" = "$DEFAULT_BRANCH"
            source_commit=$(jq -er '.head_sha | select(type == "string")' <<<"$run")
            require_sha "$source_commit"
            if [ -n "$expected_sha" ]; then test "$source_commit" = "$expected_sha"; fi
            release_artifact="release-$source_commit"
          }

          resolve_merged_pr() {
            local pulls count labels
            pulls=$(gh api "repos/${GITHUB_REPOSITORY}/commits/$source_commit/pulls") || return 1
            count=$(jq -er --arg repository "$GITHUB_REPOSITORY" --arg base "$DEFAULT_BRANCH" --arg sha "$source_commit" '
              [.[] | select(
                .merged_at != null and .merge_commit_sha == $sha and
                .head.repo.full_name == $repository and .base.repo.full_name == $repository and
                .base.ref == $base
              )] | length
            ' <<<"$pulls") || return 1
            if [ "$count" -ne 1 ]; then return 42; fi
            pull=$(jq -cer --arg repository "$GITHUB_REPOSITORY" --arg base "$DEFAULT_BRANCH" --arg sha "$source_commit" '
              [.[] | select(
                .merged_at != null and .merge_commit_sha == $sha and
                .head.repo.full_name == $repository and .base.repo.full_name == $repository and
                .base.ref == $base
              )][0]
            ' <<<"$pulls") || return 1
            review_pr=$(jq -er '.number | select(type == "number" and . > 0 and . == floor)' <<<"$pull") || return 1
            review_sha=$(jq -er '.head.sha | select(type == "string")' <<<"$pull") || return 1
            require_sha "$review_sha" || return 1
            labels=$(gh api "repos/${GITHUB_REPOSITORY}/issues/$review_pr/labels") || return 1
            if ! jq -e 'any(.[]; .name == "deploy-review")' <<<"$labels" >/dev/null; then return 42; fi
          }

          resolve_review_run() {
            local requested=${1-} context prefix statuses target run workflow_id artifacts count run_attempt expected_attempt_id
            context="buildhound/review-deployed/pr-$review_pr"
            prefix="https://github.com/${GITHUB_REPOSITORY}/actions/runs/"
            review_run_id=$requested
            if [ -z "$review_run_id" ]; then
              for attempt in {1..20}; do
                statuses=$(gh api "repos/${GITHUB_REPOSITORY}/commits/$review_sha/statuses?per_page=100")
                target=$(jq -r --arg context "$context" --arg prefix "$prefix" '
                  [.[] | select(
                    .context == $context and .state == "success" and
                    (.target_url | type) == "string" and
                    (.target_url | startswith($prefix)) and
                    ((.target_url | ltrimstr($prefix)) | test("^[1-9][0-9]*$"))
                  )][0].target_url // empty
                ' <<<"$statuses")
                if [ -n "$target" ]; then break; fi
                if [ "$attempt" -lt 20 ]; then sleep 15; fi
              done
              test -n "$target"
              review_run_id=${target#"$prefix"}
            fi
            require_run_id "$review_run_id"
            for attempt in {1..20}; do
              run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/$review_run_id")
              if [ "$(jq -r .status <<<"$run")" = completed ]; then break; fi
              if [ "$attempt" -lt 20 ]; then sleep 15; fi
            done
            workflow_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/review-environment.yml" --jq .id)
            require_run_id "$workflow_id"
            test "$(jq -r .status <<<"$run")" = completed
            test "$(jq -r .conclusion <<<"$run")" = success
            test "$(jq -r .workflow_id <<<"$run")" = "$workflow_id"
            test "$(jq -r .event <<<"$run")" = pull_request_target
            test "$(jq -r .repository.full_name <<<"$run")" = "$GITHUB_REPOSITORY"
            test "$(jq -r .head_repository.full_name <<<"$run")" = "$GITHUB_REPOSITORY"
            test "$(jq -r .head_sha <<<"$run")" = "$review_sha"
            run_attempt=$(jq -er '.run_attempt | select(type == "number" and . > 0 and . == floor)' <<<"$run")
            expected_attempt_id="${review_run_id}.${run_attempt}"
            require_artifact "$review_run_id" review-attestation
            mkdir -p "$workdir/review"
            gh run download "$review_run_id" --repo "$GITHUB_REPOSITORY" --name review-attestation --dir "$workdir/review"
            test "$(find "$workdir/review" -type f | wc -l | tr -d ' ')" = 1
            test -f "$workdir/review/review.json"
            jq -e -s --arg attemptId "$expected_attempt_id" --arg repository "$GITHUB_REPOSITORY" --arg runId "$review_run_id" \
              --argjson pr "$review_pr" --arg headSha "$review_sha" '
              length == 1 and
              .[0] as $proof |
              ($proof | type) == "object" and
              ($proof | keys) == ["attemptId","composeId","deploymentId","headSha","pr","repository","runId","schema","serverImage","siteImage"] and
              $proof.schema == 1 and $proof.repository == $repository and
              $proof.runId == $runId and $proof.pr == $pr and $proof.headSha == $headSha and
              ($proof.attemptId | type) == "string" and
              ($proof.attemptId | test("^[1-9][0-9]{0,19}\\.[1-9][0-9]{0,9}\\z")) and
              $proof.attemptId == $attemptId and
              ($proof.composeId | type) == "string" and ($proof.composeId | test("^[A-Za-z0-9_-]{1,128}\\z")) and
              ($proof.deploymentId | type) == "string" and ($proof.deploymentId | test("^[A-Za-z0-9_-]{1,128}\\z")) and
              ($proof.serverImage | type) == "string" and ($proof.serverImage | test("@sha256:[0-9a-f]{64}\\z")) and
              ($proof.siteImage | type) == "string" and ($proof.siteImage | test("@sha256:[0-9a-f]{64}\\z"))
            ' "$workdir/review/review.json" >/dev/null
            review_attempt_id=$(jq -er .attemptId "$workdir/review/review.json")
          }

          validate_source_lineage() {
            local run_id=$1 expected_sha=${2-} requested_artifact=${3-} requested_review=${4-} rc
            validate_publish_run "$run_id" "$expected_sha"
            if [ -n "$requested_artifact" ]; then test "$requested_artifact" = "$release_artifact"; fi
            rc=0
            resolve_merged_pr || rc=$?
            if [ "$rc" -ne 0 ]; then return "$rc"; fi
            require_artifact "$run_id" "$release_artifact"
            resolve_review_run "$requested_review"
          }

          require_staging_deployment() {
            local run_id=$1 deployments statuses deployment_id matches=0 prefix
            prefix="https://github.com/${GITHUB_REPOSITORY}/actions/runs/$run_id/job/"
            deployments=$(gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=staging&per_page=100")
            jq -e 'type == "array" and all(.[]; (.id | type) == "number")' <<<"$deployments" >/dev/null
            while IFS= read -r deployment_id; do
              require_run_id "$deployment_id"
              statuses=$(gh api "repos/${GITHUB_REPOSITORY}/deployments/$deployment_id/statuses?per_page=100")
              if jq -e --arg prefix "$prefix" '
                any(.[];
                  .state == "success" and (.log_url | type) == "string" and
                  (.log_url | startswith($prefix)) and
                  ((.log_url | ltrimstr($prefix)) | test("^[1-9][0-9]*$"))
                )
              ' <<<"$statuses" >/dev/null; then
                matches=$((matches + 1))
              fi
            done < <(jq -r '.[].id' <<<"$deployments")
            test "$matches" = 1
          }

          resolve_staging_proof() {
            local run_id=$1 run workflow_id mode
            require_run_id "$run_id"
            run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/$run_id")
            workflow_id=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-release.yml" --jq .id)
            require_run_id "$workflow_id"
            test "$(jq -r .status <<<"$run")" = completed
            test "$(jq -r .conclusion <<<"$run")" = success
            test "$(jq -r .workflow_id <<<"$run")" = "$workflow_id"
            test "$(jq -r .repository.full_name <<<"$run")" = "$GITHUB_REPOSITORY"
            test "$(jq -r .head_branch <<<"$run")" = "$DEFAULT_BRANCH"
            require_staging_deployment "$run_id"
            require_artifact "$run_id" staging-attestation
            mkdir -p "$workdir/staging"
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --name staging-attestation --dir "$workdir/staging"
            test "$(find "$workdir/staging" -type f | wc -l | tr -d ' ')" = 1
            test -f "$workdir/staging/staging.json"
            jq -e -s --arg runId "$run_id" '
              length == 1 and
              .[0] as $proof |
              ($proof | type) == "object" and
              ($proof | keys) == ["backup","composeDeploymentId","migrationHistorySha256","migrationId","mode","releaseId","review","runId","schema","siteDeploymentId","source"] and
              $proof.schema == 2 and $proof.runId == $runId and
              ($proof.mode == "automatic" or $proof.mode == "bootstrap") and
              ($proof.releaseId | type) == "string" and ($proof.releaseId | test("^sha256:[0-9a-f]{64}\\z")) and
              ($proof.composeDeploymentId | type) == "string" and ($proof.composeDeploymentId | test("^[A-Za-z0-9_-]{1,128}\\z")) and
              ($proof.siteDeploymentId | type) == "string" and ($proof.siteDeploymentId | test("^[A-Za-z0-9_-]{1,128}\\z")) and
              ($proof.migrationId | type) == "string" and ($proof.migrationId | test("^V[0-9]+__[A-Za-z0-9_.-]+\\z")) and
              ($proof.migrationHistorySha256 | type) == "string" and ($proof.migrationHistorySha256 | test("^[0-9a-f]{64}\\z")) and
              ($proof.source | keys) == ["artifact","commit","runId"] and
              ($proof.source.runId | type) == "string" and ($proof.source.runId | test("^[1-9][0-9]*\\z")) and
              ($proof.source.commit | type) == "string" and ($proof.source.commit | test("^[0-9a-f]{40}\\z")) and
              $proof.source.artifact == ("release-" + $proof.source.commit) and
              ($proof.review | keys) == ["attemptId","headSha","pr","runId"] and
              ($proof.review.attemptId | type) == "string" and
              ($proof.review.attemptId | test("^[1-9][0-9]{0,19}\\.[1-9][0-9]{0,9}\\z")) and
              ($proof.review.runId | type) == "string" and ($proof.review.runId | test("^[1-9][0-9]*\\z")) and
              ($proof.review.pr | type) == "number" and $proof.review.pr > 0 and $proof.review.pr == ($proof.review.pr | floor) and
              ($proof.review.headSha | type) == "string" and ($proof.review.headSha | test("^[0-9a-f]{40}\\z")) and
              ($proof.backup | keys) == ["expectedReleaseId","object","versionId"] and
              (($proof.backup.expectedReleaseId == "manual") or
               (($proof.backup.expectedReleaseId | type) == "string" and
                ($proof.backup.expectedReleaseId | test("^sha256:[0-9a-f]{64}\\z")))) and
              ($proof.backup.object | type) == "string" and ($proof.backup.object | test("^backups/buildhound-[0-9]{8}T[0-9]{6}Z[.]dump[.]age$")) and
              ($proof.backup.versionId | type) == "string" and ($proof.backup.versionId | length) > 0 and
              ($proof.backup.versionId != "null" and $proof.backup.versionId != "None")
            ' "$workdir/staging/staging.json" >/dev/null
            mode=$(jq -er .mode "$workdir/staging/staging.json")
            if [ "$mode" = automatic ]; then
              test "$(jq -r .event <<<"$run")" = workflow_run
            else
              test "$(jq -r .event <<<"$run")" = workflow_dispatch
            fi
            source_run_id=$(jq -er .source.runId "$workdir/staging/staging.json")
            source_commit=$(jq -er .source.commit "$workdir/staging/staging.json")
            release_artifact=$(jq -er .source.artifact "$workdir/staging/staging.json")
            review_run_id=$(jq -er .review.runId "$workdir/staging/staging.json")
            review_attempt_id=$(jq -er .review.attemptId "$workdir/staging/staging.json")
            review_pr=$(jq -er .review.pr "$workdir/staging/staging.json")
            review_sha=$(jq -er .review.headSha "$workdir/staging/staging.json")
            proven_release_id=$(jq -er .releaseId "$workdir/staging/staging.json")
            validate_source_lineage "$source_run_id" "$source_commit" "$release_artifact" "$review_run_id"
            test "$(jq -r .review.pr "$workdir/staging/staging.json")" = "$review_pr"
            test "$(jq -r .review.headSha "$workdir/staging/staging.json")" = "$review_sha"
            test "$(jq -r .review.attemptId "$workdir/staging/staging.json")" = "$review_attempt_id"
          }

          eligible=true
          target=
          mode=
          source_run_id=
          source_commit=
          release_artifact=
          review_run_id=
          review_attempt_id=
          review_pr=
          review_sha=
          proven_release_id=
          bootstrap_bom=false
          rollback_compatible=false
          staging_run_id=

          if [ "$EVENT_NAME" = workflow_run ]; then
            target=staging
            mode=automatic
            source_run_id=$EVENT_SOURCE_RUN
            validate_publish_run "$source_run_id" "$EVENT_SOURCE_SHA"
            rc=0
            resolve_merged_pr || rc=$?
            if [ "$rc" -eq 42 ]; then
              eligible=false
            elif [ "$rc" -ne 0 ]; then
              exit "$rc"
            else
              artifact_rc=0
              require_artifact "$source_run_id" "$release_artifact" || artifact_rc=$?
              if [ "$artifact_rc" -eq 42 ]; then
                eligible=false
              elif [ "$artifact_rc" -ne 0 ]; then
                exit "$artifact_rc"
              else
                resolve_review_run
              fi
            fi
          elif [ "$EVENT_NAME" = workflow_dispatch ]; then
            test "$GITHUB_REF" = "refs/heads/$DEFAULT_BRANCH"
            case "$INPUT_TARGET" in
              staging)
                test "$INPUT_BOOTSTRAP" = true
                test -n "$INPUT_SOURCE_RUN" && test -n "$INPUT_RELEASE_ARTIFACT" && test -n "$INPUT_BACKUP_OBJECT"
                target=staging
                mode=bootstrap
                bootstrap_bom=true
                source_run_id=$INPUT_SOURCE_RUN
                validate_source_lineage "$source_run_id" "" "$INPUT_RELEASE_ARTIFACT" ""
                ;;
              production)
                test -n "$INPUT_STAGING_RUN" && test -n "$INPUT_BACKUP_OBJECT"
                target=production
                mode=production
                staging_run_id=$INPUT_STAGING_RUN
                resolve_staging_proof "$staging_run_id"
                case "$INPUT_BOOTSTRAP" in true|false) bootstrap_bom=$INPUT_BOOTSTRAP ;; *) exit 1;; esac
                case "$INPUT_ROLLBACK" in true|false) rollback_compatible=$INPUT_ROLLBACK ;; *) exit 1;; esac
                if [ "$bootstrap_bom" = true ]; then test "$rollback_compatible" = true; fi
                ;;
              *) exit 1 ;;
            esac
          else
            exit 1
          fi

          {
            echo "eligible=$eligible"
            echo "target=$target"
            echo "mode=$mode"
            echo "source_run_id=$source_run_id"
            echo "source_commit=$source_commit"
            echo "release_artifact=$release_artifact"
            echo "review_run_id=$review_run_id"
            echo "review_attempt_id=$review_attempt_id"
            echo "review_pr=$review_pr"
            echo "review_sha=$review_sha"
            echo "proven_release_id=$proven_release_id"
            echo "bootstrap_bom=$bootstrap_bom"
            echo "rollback_compatible=$rollback_compatible"
            echo "staging_run_id=$staging_run_id"
          } >> "$GITHUB_OUTPUT"

  deploy:
    needs: resolve
    if: needs.resolve.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.target }}
    permissions: {actions: read, contents: read, deployments: write}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.resolve.outputs.release_artifact }}
          run-id: ${{ needs.resolve.outputs.source_run_id }}
          github-token: ${{ github.token }}
          path: /tmp/release
      - uses: actions/download-artifact@v4
        if: needs.resolve.outputs.target == 'staging'
        with:
          name: review-attestation
          run-id: ${{ needs.resolve.outputs.review_run_id }}
          github-token: ${{ github.token }}
          path: /tmp/review
      - uses: actions/download-artifact@v4
        if: needs.resolve.outputs.target == 'production'
        with:
          name: staging-attestation
          run-id: ${{ needs.resolve.outputs.staging_run_id }}
          github-token: ${{ github.token }}
          path: /tmp/staging
      - name: Revalidate exact release and promotion proof
        id: release_gate
        env:
          TARGET: ${{ needs.resolve.outputs.target }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run_id }}
          SOURCE_COMMIT: ${{ needs.resolve.outputs.source_commit }}
          RELEASE_ARTIFACT: ${{ needs.resolve.outputs.release_artifact }}
          REVIEW_RUN: ${{ needs.resolve.outputs.review_run_id }}
          REVIEW_ATTEMPT: ${{ needs.resolve.outputs.review_attempt_id }}
          REVIEW_PR: ${{ needs.resolve.outputs.review_pr }}
          REVIEW_SHA: ${{ needs.resolve.outputs.review_sha }}
          STAGING_RUN: ${{ needs.resolve.outputs.staging_run_id }}
          PROVEN_RELEASE_ID: ${{ needs.resolve.outputs.proven_release_id }}
        run: |
          set -euo pipefail
          test "$(find /tmp/release -type f | wc -l | tr -d ' ')" = 4
          test -f /tmp/release/release.json
          test -f /tmp/release/stack.yaml
          test -f /tmp/release/staging-stack.yaml
          test -f /tmp/release/volume-guard.sh
          test "$(jq -er .schema /tmp/release/release.json)" = 3
          test "$(sha256sum /tmp/release/stack.yaml | cut -d' ' -f1)" = \
            "$(jq -er .productionManifestSha256 /tmp/release/release.json)"
          test "$(sha256sum /tmp/release/staging-stack.yaml | cut -d' ' -f1)" = \
            "$(jq -er .stagingManifestSha256 /tmp/release/release.json)"
          id=$(bash deploy/dokploy/dokploy.sh release-id /tmp/release/release.json)
          test "$(jq -er .sourceCommit /tmp/release/release.json)" = "$SOURCE_COMMIT"
          test "$RELEASE_ARTIFACT" = "release-$SOURCE_COMMIT"
          if [ "$TARGET" = staging ]; then
            jq -e -s --arg attemptId "$REVIEW_ATTEMPT" --arg repository "$GITHUB_REPOSITORY" --arg runId "$REVIEW_RUN" \
              --argjson pr "$REVIEW_PR" --arg headSha "$REVIEW_SHA" '
              length == 1 and .[0] as $proof |
              ($proof | type) == "object" and
              ($proof | keys) == ["attemptId","composeId","deploymentId","headSha","pr","repository","runId","schema","serverImage","siteImage"] and
              $proof.schema == 1 and $proof.repository == $repository and
              $proof.runId == $runId and $proof.attemptId == $attemptId and
              $proof.pr == $pr and $proof.headSha == $headSha
            ' /tmp/review/review.json >/dev/null
          else
            test "$id" = "$PROVEN_RELEASE_ID"
            jq -e -s --arg releaseId "$id" --arg runId "$STAGING_RUN" \
              --arg sourceRun "$SOURCE_RUN" --arg sourceCommit "$SOURCE_COMMIT" \
              --arg sourceArtifact "$RELEASE_ARTIFACT" '
              length == 1 and .[0] as $proof |
              ($proof | type) == "object" and $proof.schema == 2 and
              $proof.releaseId == $releaseId and $proof.runId == $runId and
              $proof.source == {runId:$sourceRun,commit:$sourceCommit,artifact:$sourceArtifact}
            ' /tmp/staging/staging.json >/dev/null
          fi
          echo "release_id=$id" >> "$GITHUB_OUTPUT"
      - name: Select and verify fresh encrypted backup
        id: backup
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.BACKUP_AWS_REGION }}
          BACKUP_S3_ENDPOINT: ${{ vars.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
          BUILDHOUND_DB_INSTANCE: ${{ secrets.BUILDHOUND_DB_INSTANCE }}
          BUILDHOUND_AGE_RECIPIENT: ${{ vars.BUILDHOUND_AGE_RECIPIENT }}
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          TARGET: ${{ needs.resolve.outputs.target }}
          MODE: ${{ needs.resolve.outputs.mode }}
          BOOTSTRAP: ${{ needs.resolve.outputs.bootstrap_bom }}
          BACKUP_OBJECT: ${{ inputs.backup_object }}
        run: |
          set -euo pipefail
          bootstrap=$BOOTSTRAP
          # The first-ever automatic staging deploy has no release history to
          # verify against; it may proceed only from the explicit plan-087
          # manual anchor. Any other anchorless state fails closed.
          if [ "$bootstrap" != true ] && [ "$TARGET" = staging ] && [ "$MODE" = automatic ]; then
            state=$(bash deploy/dokploy/dokploy.sh staging-bootstrap-state --compose-id "$COMPOSE_ID")
            if [ "$state" = bootstrap ]; then
              echo "::notice::No prior release deployment on the staging compose; engaging the first-deploy bootstrap path against the manual anchor"
              bootstrap=true
            else
              test "$state" = established
            fi
          fi
          if [ "$bootstrap" = true ]; then
            expected=manual
            bash deploy/dokploy/dokploy.sh require-manual-current --compose-id "$COMPOSE_ID"
          else
            expected=$(bash deploy/dokploy/dokploy.sh current-release-id --compose-id "$COMPOSE_ID")
          fi
          echo "bootstrap=$bootstrap" >> "$GITHUB_OUTPUT"
          if [ "$TARGET" = staging ] && [ "$MODE" = automatic ]; then
            bash deploy/dokploy/select-backup.sh --latest --expected-release-id "$expected" > /tmp/backup-selection.json
          else
            test -n "$BACKUP_OBJECT"
            bash deploy/dokploy/select-backup.sh --object "$BACKUP_OBJECT" --expected-release-id "$expected" > /tmp/backup-selection.json
          fi
          jq -e 'keys == ["expectedReleaseId","object","versionId"]' /tmp/backup-selection.json >/dev/null
      - name: Explicit Dokploy deploy
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          DOKPLOY_GIT_PROVIDER_ID: ${{ secrets.DOKPLOY_GIT_PROVIDER_ID }}
          DOKPLOY_REGISTRY_ID: ${{ secrets.DOKPLOY_REGISTRY_ID }}
          COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          SITE_APPLICATION_ID: ${{ secrets.DOKPLOY_SITE_APPLICATION_ID }}
          VALIDATED_RELEASE_ID: ${{ steps.release_gate.outputs.release_id }}
          TARGET: ${{ needs.resolve.outputs.target }}
          MODE: ${{ needs.resolve.outputs.mode }}
          SOURCE_COMMIT: ${{ needs.resolve.outputs.source_commit }}
          BOOTSTRAP: ${{ steps.backup.outputs.bootstrap }}
          ROLLBACK_COMPATIBLE: ${{ needs.resolve.outputs.rollback_compatible }}
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          source deploy/dokploy/lib/release.sh
          compatibility=()
          bootstrap=()
          predecessor=()
          proof=()
          case "$TARGET" in
            staging)
              app_role=staging
              manifest=/tmp/release/staging-stack.yaml
              ;;
            production)
              app_role=prod
              manifest=/tmp/release/stack.yaml
              ;;
            *) echo "::error::Unsupported deployment target"; exit 1 ;;
          esac
          if [ "$ROLLBACK_COMPATIBLE" = true ]; then compatibility+=(--rollback-compatible); fi
          if [ "$BOOTSTRAP" = true ]; then bootstrap+=(--bootstrap-manual-current); fi
          if [ "$TARGET" = production ]; then proof+=(--proven-release-id "$VALIDATED_RELEASE_ID"); fi
          selected_predecessor=$(jq -er '.expectedReleaseId | select(type == "string")' /tmp/backup-selection.json)
          if [ "$BOOTSTRAP" = true ]; then
            test "$selected_predecessor" = manual
          else
            [[ "$selected_predecessor" =~ ^sha256:[0-9a-f]{64}$ ]]
            predecessor+=(--expected-current-release-id "$selected_predecessor")
          fi
          if [ "$TARGET" = staging ] || [ "$TARGET" = production ]; then
            latest=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/$DEFAULT_BRANCH" --jq .object.sha)
            main_progress=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${SOURCE_COMMIT}...${latest}" --jq .status)
            case "$main_progress" in
              identical|ahead) ;;
              *)
                echo "::error::Staging candidate is not an ancestor of current main"
                exit 1
                ;;
            esac
            if [ "$BOOTSTRAP" != true ]; then
              current_state=$(bash deploy/dokploy/dokploy.sh current-release-state --compose-id "$COMPOSE_ID")
              test "$(jq -er .releaseId <<<"$current_state")" = "$selected_predecessor"
              current_source=$(jq -er '.sourceCommit | select(type == "string" and test("^[0-9a-f]{40}\\z"))' <<<"$current_state")
              deployment_progress=$(gh api "repos/${GITHUB_REPOSITORY}/compare/${current_source}...${SOURCE_COMMIT}" --jq .status)
              require_deployment_progress \
                "$selected_predecessor" "$VALIDATED_RELEASE_ID" \
                "$deployment_progress" "$TARGET" "$ROLLBACK_COMPATIBLE"
            fi
          fi
          bash deploy/dokploy/dokploy.sh deploy-release /tmp/release/release.json \
            --base-repo "$GITHUB_REPOSITORY" \
            --manifest "$manifest" \
            --volume-guard /tmp/release/volume-guard.sh \
            --compose-id "$COMPOSE_ID" \
            --site-application-id "$SITE_APPLICATION_ID" \
            --app-role "$app_role" \
            "${proof[@]}" "${compatibility[@]}" "${bootstrap[@]}" \
            "${predecessor[@]}" > deployment-evidence.json
      - name: Verify public site and authenticated data path
        env:
          BUILDHOUND_SITE_URL: ${{ vars.BUILDHOUND_SITE_URL }}
          BUILDHOUND_DASHBOARD_URL: ${{ vars.BUILDHOUND_DASHBOARD_URL }}
          BUILDHOUND_READ_TOKEN: ${{ secrets.BUILDHOUND_READ_TOKEN }}
          BUILDHOUND_INGEST_TOKEN: ${{ secrets.BUILDHOUND_INGEST_TOKEN }}
        run: deploy/dokploy/verify-release.sh
      - name: Record staging attestation
        if: needs.resolve.outputs.target == 'staging'
        env:
          MODE: ${{ needs.resolve.outputs.mode }}
          SOURCE_RUN: ${{ needs.resolve.outputs.source_run_id }}
          SOURCE_COMMIT: ${{ needs.resolve.outputs.source_commit }}
          RELEASE_ARTIFACT: ${{ needs.resolve.outputs.release_artifact }}
          REVIEW_RUN: ${{ needs.resolve.outputs.review_run_id }}
          REVIEW_ATTEMPT: ${{ needs.resolve.outputs.review_attempt_id }}
          REVIEW_PR: ${{ needs.resolve.outputs.review_pr }}
          REVIEW_SHA: ${{ needs.resolve.outputs.review_sha }}
        run: |
          jq --arg runId "$GITHUB_RUN_ID" --arg mode "$MODE" \
            --arg sourceRun "$SOURCE_RUN" --arg sourceCommit "$SOURCE_COMMIT" \
            --arg sourceArtifact "$RELEASE_ARTIFACT" --arg reviewRun "$REVIEW_RUN" \
            --arg reviewAttempt "$REVIEW_ATTEMPT" \
            --argjson reviewPr "$REVIEW_PR" --arg reviewSha "$REVIEW_SHA" \
            --slurpfile backup /tmp/backup-selection.json '
            . + {
              schema:2,
              runId:$runId,
              mode:$mode,
              source:{runId:$sourceRun,commit:$sourceCommit,artifact:$sourceArtifact},
              review:{runId:$reviewRun,attemptId:$reviewAttempt,pr:$reviewPr,headSha:$reviewSha},
              backup:$backup[0]
            }
          ' deployment-evidence.json > staging.json
      - uses: actions/upload-artifact@v4
        if: needs.resolve.outputs.target == 'staging'
        with: {name: staging-attestation, path: staging.json, retention-days: 90}
