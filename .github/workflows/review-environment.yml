name: Review environment
on:
  pull_request_target:
    branches: [main]
    types: [labeled, synchronize, reopened, closed, unlabeled]
permissions: {contents: read, pull-requests: read, actions: read}
env:
  IMAGE_REGISTRY_PREFIX: ghcr.io/buildhound
  REVIEW_ACTION: ${{ (github.event.action == 'closed' || (github.event.action == 'unlabeled' && github.event.label.name == 'deploy-review')) && 'retire' || 'deploy' }}
  REVIEW_PR: ${{ github.event.pull_request.number }}
  REVIEW_SHA: ${{ github.event.pull_request.head.sha }}
jobs:
  review:
    if: >-
      github.event.action == 'closed' ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'deploy-review') ||
      (github.event.action == 'labeled' && github.event.label.name == 'deploy-review') ||
      ((github.event.action == 'synchronize' || github.event.action == 'reopened') &&
       contains(github.event.pull_request.labels.*.name, 'deploy-review'))
    runs-on: ubuntu-latest
    environment: ${{ (github.event.action == 'closed' || (github.event.action == 'unlabeled' && github.event.label.name == 'deploy-review')) && 'review-cleanup' || 'review' }}
    concurrency: {group: review-environment-global, queue: max, cancel-in-progress: false}
    permissions: {contents: read, pull-requests: read, issues: read, actions: read, packages: write, statuses: write}
    outputs:
      deploy_outcome: ${{ steps.deploy_status.outputs.outcome }}
      publish_outcome: ${{ steps.deploy_status.outputs.publish_outcome }}
      review_request_event_id: ${{ steps.pr.outputs.review_request_event_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"
          persist-credentials: false
      - name: Require the protected default branch workflow
        env:
          DEFAULT_BRANCH: "${{ github.event.repository.default_branch }}"
          BASE_REF: "${{ github.base_ref }}"
        run: |
          if [ -n "$BASE_REF" ]; then test "$BASE_REF" = "$DEFAULT_BRANCH"; fi
          test "$GITHUB_REF" = "refs/heads/$DEFAULT_BRANCH"
      - id: pr
        env:
          GH_TOKEN: "${{ github.token }}"
          PR: "${{ env.REVIEW_PR }}"
          EXPECTED_SHA: "${{ env.REVIEW_SHA }}"
          ACTION: "${{ env.REVIEW_ACTION }}"
        run: |
          [[ "$PR" =~ ^[1-9][0-9]*$ ]]
          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$ACTION" = deploy || "$ACTION" = retire ]]
          data=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/$PR")
          if [ "$ACTION" = deploy ]; then
            test "$(jq -r .head.repo.full_name <<<"$data")" = "$GITHUB_REPOSITORY"
            test "$(jq -r .state <<<"$data")" = open
            test "$(jq -r .head.sha <<<"$data")" = "$EXPECTED_SHA"
            gh api "repos/${GITHUB_REPOSITORY}/issues/$PR/labels" --jq '.[].name' | grep -Fx deploy-review
            events=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/$PR/events?per_page=100")
            review_request_event_id=$(jq -ser '
              [ .[][] |
                select(
                  (.event == "labeled" and .label.name == "deploy-review") or
                  .event == "reopened"
                ) |
                select(
                  (.created_at | type) == "string" and
                  (.created_at | test("^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$")) and
                  (.id | type) == "number" and .id >= 1 and (.id | floor) == .id
                )
              ] | sort_by(.created_at, .id) | last.id | tostring |
              select(test("^[1-9][0-9]*$"))
            ' <<<"$events")
            echo "review_request_event_id=$review_request_event_id" >> "$GITHUB_OUTPUT"
          else
            { test "$(jq -r .state <<<"$data")" != open || ! gh api "repos/${GITHUB_REPOSITORY}/issues/$PR/labels" --jq '.[].name' | grep -Fx deploy-review; }
          fi
      - name: Record pending exact-SHA review deployment
        if: env.REVIEW_ACTION == 'deploy'
        env:
          GH_TOKEN: "${{ github.token }}"
          PR: "${{ env.REVIEW_PR }}"
          SHA: "${{ env.REVIEW_SHA }}"
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/$SHA" \
            -f state=pending \
            -f context="buildhound/review-deployed/pr-$PR" \
            -f description='Protected review deployment is running' \
            -f target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >/dev/null
      - name: Enforce active ceiling
        if: env.REVIEW_ACTION == 'deploy'
        env:
          DOKPLOY_URL: "${{ vars.DOKPLOY_URL }}"
          DOKPLOY_TOKEN: "${{ secrets.DOKPLOY_TOKEN }}"
          ENVIRONMENT_ID: "${{ secrets.DOKPLOY_ENVIRONMENT_ID }}"
          MAX: "${{ vars.BUILDHOUND_REVIEW_MAX_ACTIVE }}"
          PR: "${{ env.REVIEW_PR }}"
        run: |
          [[ "$MAX" =~ ^[1-9][0-9]*$ ]]
          active=$(bash deploy/dokploy/dokploy.sh count-reviews --base-repo "$GITHUB_REPOSITORY" --environment-id "$ENVIRONMENT_ID" --exclude-pr "$PR")
          [[ "$active" =~ ^[0-9]+$ ]]
          (( active < MAX ))
      - name: Verify pre-warmed wildcard TLS
        if: env.REVIEW_ACTION == 'deploy'
        env:
          DNS_SUFFIX: "${{ vars.BUILDHOUND_REVIEW_DNS_SUFFIX }}"
        run: |
          python3 - "$DNS_SUFFIX" <<'PY'
          import re
          import sys
          suffix = sys.argv[1]
          label = re.compile(r"[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?")
          if len(suffix) > 253 or len(suffix.split(".")) < 2 or suffix != suffix.lower() or any(not label.fullmatch(part) for part in suffix.split(".")):
              raise SystemExit("invalid review DNS suffix")
          PY
          while IFS='|' read -r host wildcard; do
            certificate=$(timeout 20 openssl s_client -connect "$host:443" -servername "$host" -verify_hostname "$host" -verify_return_error </dev/null 2>/dev/null | openssl x509 -outform PEM)
            test -n "$certificate"
            openssl x509 -noout -checkhost "$host" <<<"$certificate"
            openssl x509 -noout -ext subjectAltName <<<"$certificate" | tr ',' '\n' | sed 's/^[[:space:]]*//' | grep -Fx "DNS:$wildcard"
          done <<EOF
          certificate-check.$DNS_SUFFIX|*.$DNS_SUFFIX
          certificate-check.dashboard.$DNS_SUFFIX|*.dashboard.$DNS_SUFFIX
          EOF
      - name: Check out the exact untrusted review source
        if: env.REVIEW_ACTION == 'deploy'
        uses: actions/checkout@v7
        with:
          ref: "${{ env.REVIEW_SHA }}"
          path: review-source
          persist-credentials: false
      - uses: docker/setup-buildx-action@v4
        if: env.REVIEW_ACTION == 'deploy'
      - name: Build review server without registry credentials
        if: env.REVIEW_ACTION == 'deploy'
        uses: docker/build-push-action@v7
        with:
          context: review-source
          file: review-source/buildhound-server/Dockerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_REGISTRY_PREFIX }}/buildhound-server:pr-${{ env.REVIEW_PR }}-${{ env.REVIEW_SHA }}
      - name: Build review site without registry credentials
        if: env.REVIEW_ACTION == 'deploy'
        uses: docker/build-push-action@v7
        with:
          context: review-source
          file: review-source/site/Dockerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_REGISTRY_PREFIX }}/buildhound-site:pr-${{ env.REVIEW_PR }}-${{ env.REVIEW_SHA }}
      - name: Revalidate exact review source before publishing
        if: env.REVIEW_ACTION == 'deploy'
        env:
          GH_TOKEN: "${{ github.token }}"
          PR: "${{ env.REVIEW_PR }}"
          SHA: "${{ env.REVIEW_SHA }}"
        run: |
          data=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/$PR")
          test "$(jq -r .head.repo.full_name <<<"$data")" = "$GITHUB_REPOSITORY"
          test "$(jq -r .state <<<"$data")" = open
          test "$(jq -r .head.sha <<<"$data")" = "$SHA"
          gh api "repos/${GITHUB_REPOSITORY}/issues/$PR/labels" --jq '.[].name' | grep -Fx deploy-review
      - uses: docker/login-action@v4
        if: env.REVIEW_ACTION == 'deploy'
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - id: publish
        name: Publish exact review images and record push digests
        if: env.REVIEW_ACTION == 'deploy'
        env:
          PR: "${{ env.REVIEW_PR }}"
          SHA: "${{ env.REVIEW_SHA }}"
        run: |
          server="$IMAGE_REGISTRY_PREFIX/buildhound-server:pr-$PR-$SHA"
          site="$IMAGE_REGISTRY_PREFIX/buildhound-site:pr-$PR-$SHA"
          [[ "$server" =~ ^ghcr\.io/buildhound/buildhound-server:pr-[1-9][0-9]*-[0-9a-f]{40}$ ]]
          [[ "$site" =~ ^ghcr\.io/buildhound/buildhound-site:pr-[1-9][0-9]*-[0-9a-f]{40}$ ]]

          push_digest() {
            local image=$1 log=$2 digest count
            docker push "$image" >"$log" || return 1
            digest=$(sed -nE 's/^.*digest: (sha256:[0-9a-f]{64}).*$/\1/p' "$log") || return 1
            count=$(printf '%s\n' "$digest" | sed '/^$/d' | wc -l | tr -d ' ') || return 1
            test "$count" = 1 || return 1
            printf '%s\n' "$digest"
          }

          server_digest=$(push_digest "$server" /tmp/review-server-push.log) || exit 1
          site_digest=$(push_digest "$site" /tmp/review-site-push.log) || exit 1
          [[ "$server_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$site_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          mkdir -p /tmp/review-images
          jq -cn --arg repository "$GITHUB_REPOSITORY" --argjson pr "$PR" \
            --arg headSha "$SHA" --arg runId "$GITHUB_RUN_ID" \
            --arg serverImage "$IMAGE_REGISTRY_PREFIX/buildhound-server" --arg serverDigest "$server_digest" \
            --arg siteImage "$IMAGE_REGISTRY_PREFIX/buildhound-site" --arg siteDigest "$site_digest" '
            {
              schema:1,
              repository:$repository,
              pr:$pr,
              headSha:$headSha,
              runId:$runId,
              images:{
                server:{image:$serverImage,digest:$serverDigest},
                site:{image:$siteImage,digest:$siteDigest}
              }
            }
          ' > /tmp/review-images/review-images.json
      - name: Deploy and verify trusted review manifest
        id: deploy
        if: env.REVIEW_ACTION == 'deploy'
        env:
          DOKPLOY_URL: "${{ vars.DOKPLOY_URL }}"
          DOKPLOY_TOKEN: "${{ secrets.DOKPLOY_TOKEN }}"
          DOKPLOY_GIT_PROVIDER_ID: "${{ secrets.DOKPLOY_GIT_PROVIDER_ID }}"
          DOKPLOY_REGISTRY_ID: "${{ secrets.DOKPLOY_REGISTRY_ID }}"
          ENVIRONMENT_ID: "${{ secrets.DOKPLOY_ENVIRONMENT_ID }}"
          DNS_SUFFIX: "${{ vars.BUILDHOUND_REVIEW_DNS_SUFFIX }}"
          GH_TOKEN: "${{ github.token }}"
          PR: "${{ env.REVIEW_PR }}"
          SHA: "${{ env.REVIEW_SHA }}"
          ATTEMPT_ID: "${{ github.run_id }}.${{ github.run_attempt }}"
          REVIEW_REQUEST_EVENT_ID: "${{ steps.pr.outputs.review_request_event_id }}"
          BUILDHOUND_REVIEW_TOKEN_SECRET: "${{ secrets.BUILDHOUND_REVIEW_TOKEN }}"
        run: |
          [[ "$REVIEW_REQUEST_EVENT_ID" =~ ^[1-9][0-9]*$ ]]
          server=$(jq -er .images.server.image /tmp/review-images/review-images.json)
          site=$(jq -er .images.site.image /tmp/review-images/review-images.json)
          server_digest=$(jq -er .images.server.digest /tmp/review-images/review-images.json)
          site_digest=$(jq -er .images.site.digest /tmp/review-images/review-images.json)
          BUILDHOUND_REVIEW_DB_PASSWORD=$(openssl rand -hex 32); export BUILDHOUND_REVIEW_DB_PASSWORD
          # Owner-provisioned review token (plan 099): when the review-environment secret
          # exists it becomes every review env's bootstrap token, so the owner can open any
          # review dashboard by pasting the one value they stored. Absent secret falls back
          # to the plan-094 per-run value (merge-safe before provisioning; deleting the
          # secret restores the zero-persistence model). The delivery client rejects values
          # not matching ^[0-9a-f]{64}$ — provision with `openssl rand -hex 32`.
          BUILDHOUND_REVIEW_TOKEN=${BUILDHOUND_REVIEW_TOKEN_SECRET:-$(openssl rand -hex 32)}; export BUILDHOUND_REVIEW_TOKEN
          echo "::add-mask::$BUILDHOUND_REVIEW_DB_PASSWORD"; echo "::add-mask::$BUILDHOUND_REVIEW_TOKEN"

          # This is the final external check before the trusted client mutates Dokploy.
          data=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/$PR")
          head_repo=$(jq -er .head.repo.full_name <<<"$data")
          state=$(jq -er .state <<<"$data")
          head_sha=$(jq -er .head.sha <<<"$data")
          test "$head_repo" = "$GITHUB_REPOSITORY"
          test "$state" = open
          test "$head_sha" = "$SHA"
          gh api "repos/${GITHUB_REPOSITORY}/issues/$PR/labels" --jq '.[].name' | grep -Fx deploy-review
          result=$(bash deploy/dokploy/dokploy.sh deploy-review --base-repo "$GITHUB_REPOSITORY" --head-repo "$head_repo" --pr "$PR" --sha "$head_sha" --state "$state" --label-present --environment-id "$ENVIRONMENT_ID" --dns-suffix "$DNS_SUFFIX" --server-image "$server@$server_digest" --site-image "$site@$site_digest" --attempt-id "$ATTEMPT_ID")

          review_name=$(jq -er .name <<<"$result")
          compose_id=$(jq -er .composeId <<<"$result")
          deployment_id=$(jq -er .deploymentId <<<"$result")
          [[ "$review_name" =~ ^[a-z0-9-]{1,63}$ ]]
          [[ "$compose_id" =~ ^[A-Za-z0-9_-]{1,128}$ ]]
          [[ "$deployment_id" =~ ^[A-Za-z0-9_-]{1,128}$ ]]
          echo "compose_id=$compose_id" >> "$GITHUB_OUTPUT"
          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"
          site_host="$review_name.$DNS_SUFFIX"
          dashboard_host="$review_name.dashboard.$DNS_SUFFIX"
          python3 - "$site_host" "$dashboard_host" <<'PY'
          import re
          import sys
          label = re.compile(r"[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?")
          for host in sys.argv[1:]:
              if len(host) > 253 or any(not label.fullmatch(part) for part in host.split(".")):
                  raise SystemExit("invalid review HTTPS host")
          PY

          site_url="https://$site_host"
          dashboard_url="https://$dashboard_host"
          common=(--silent --show-error --fail --retry 30 --retry-delay 5 --retry-max-time 300 --retry-all-errors --connect-timeout 10 --max-time 20 --write-out '%{http_code}')
          status=$(curl "${common[@]}" --dump-header /tmp/review-site-headers --output /tmp/review-site-body "$site_url/")
          test "$status" = 200
          test "$(tr -d '\r' < /tmp/review-site-headers | awk 'BEGIN { count=0; exact=0 } tolower($0) ~ /^x-robots-tag:/ { count++; value=$0; sub(/^[^:]*:[ \t]*/, "", value); if (value == "noindex, nofollow") exact++ } END { print count ":" exact }')" = '1:1'
          python3 - /tmp/review-site-body "$dashboard_url" <<'PY'
          import sys
          from html.parser import HTMLParser

          class DashboardLink(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.matches = 0

              def handle_starttag(self, tag, attrs):
                  if tag != "a":
                      return
                  attributes = dict(attrs)
                  if "primary" in attributes.get("class", "").split() and attributes.get("href") == sys.argv[2]:
                      self.matches += 1

          parser = DashboardLink()
          with open(sys.argv[1], encoding="utf-8") as page:
              parser.feed(page.read())
          if parser.matches != 1:
              raise SystemExit("review site dashboard link does not match its review dashboard origin")
          PY
          status=$(curl "${common[@]}" --dump-header /tmp/review-dashboard-headers --output /dev/null "$dashboard_url/health")
          test "$status" = 200
          tr -d '\r' < /tmp/review-dashboard-headers | grep -Fxi 'X-Robots-Tag: noindex, nofollow'

          build_id=$(python3 -c 'import uuid; print(uuid.uuid4())')
          now_ms=$(python3 -c 'import time; print(int(time.time() * 1000))')
          jq --arg id "$build_id" --arg sha "$SHA" --argjson now "$now_ms" '
            .buildId = $id |
            .projectKey = "review-smoke" |
            .startedAt = $now |
            .finishedAt = ($now + 1000) |
            .vcs.sha = $sha |
            .vcs.branch = "review-smoke" |
            .ci.runId = $id |
            .ci.buildUrl = "https://example.invalid/review-smoke"
          ' buildhound-commons/src/jvmTest/resources/golden/build-payload-v1.json > /tmp/review-payload.json
          status=$(curl "${common[@]}" --output /dev/null --request POST --header "Authorization: Bearer $BUILDHOUND_REVIEW_TOKEN" --header 'Content-Type: application/json' --data-binary @/tmp/review-payload.json "$dashboard_url/v1/builds")
          test "$status" = 202
          status=$(curl "${common[@]}" --output /tmp/review-read.json --header "Authorization: Bearer $BUILDHOUND_REVIEW_TOKEN" "$dashboard_url/v1/builds/$build_id")
          test "$status" = 200
          jq -e --arg id "$build_id" '.buildId == $id' /tmp/review-read.json > /dev/null

          # Plan 094: hand the dashboard URL + review token (owner-provisioned or per-run,
          # plan 099) to the payload-publish step below. The token is masked above; a step
          # output stays inside this job on this runner (it never crosses a job boundary,
          # unlike job-level outputs, which GitHub drops when they contain a masked value).
          echo "dashboard_url=$dashboard_url" >> "$GITHUB_OUTPUT"
          echo "review_token=$BUILDHOUND_REVIEW_TOKEN" >> "$GITHUB_OUTPUT"

          mkdir -p /tmp/review-attestation
          jq -cn --arg attemptId "$ATTEMPT_ID" --arg repository "$GITHUB_REPOSITORY" --argjson pr "$PR" \
            --arg headSha "$SHA" --arg serverImage "$server@$server_digest" \
            --arg siteImage "$site@$site_digest" --arg composeId "$compose_id" \
            --arg deploymentId "$deployment_id" --arg runId "$GITHUB_RUN_ID" --argjson runAttempt "$GITHUB_RUN_ATTEMPT" \
            --arg serverDigest "$server_digest" --arg siteDigest "$site_digest" \
            --arg reviewRequestEventId "$REVIEW_REQUEST_EVENT_ID" '
            {
              schema:1,
              attemptId:$attemptId,
              repository:$repository,
              pr:$pr,
              headSha:$headSha,
              serverImage:$serverImage,
              siteImage:$siteImage,
              composeId:$composeId,
              deploymentId:$deploymentId,
              reviewRequestEventId:$reviewRequestEventId,
              runId:$runId,
              runAttempt:$runAttempt,
              serverDigest:$serverDigest,
              siteDigest:$siteDigest
            }
          ' > /tmp/review-attestation/review.json
      - uses: actions/upload-artifact@v7
        if: env.REVIEW_ACTION == 'deploy' && steps.deploy.outcome == 'success'
        with: {name: review-attestation, path: /tmp/review-attestation/review.json, retention-days: 90}
      - id: deploy_status
        name: Capture deploy step outcome
        if: ${{ always() }}
        env:
          OUTCOME: "${{ steps.deploy.outcome }}"
          PUBLISH_OUTCOME: "${{ steps.publish.outcome }}"
        run: |
          case "$OUTCOME" in success|failure|cancelled|skipped) ;; *) exit 1;; esac
          case "$PUBLISH_OUTCOME" in success|failure|cancelled|skipped) ;; *) exit 1;; esac
          echo "outcome=$OUTCOME" >> "$GITHUB_OUTPUT"
          echo "publish_outcome=$PUBLISH_OUTCOME" >> "$GITHUB_OUTPUT"
      - name: Delete superseded exact-owned review images
        if: env.REVIEW_ACTION == 'deploy' && steps.deploy.outcome == 'success'
        env:
          GH_TOKEN: "${{ github.token }}"
          REVIEW_PR: "${{ env.REVIEW_PR }}"
          KEEP_SHA: "${{ env.REVIEW_SHA }}"
        run: |
          if ! deploy/dokploy/delete-review-images.sh; then
            echo "::warning::Superseded review-image cleanup failed; the next deploy or strict retirement will retry it"
          fi
      # Plan 094: replay this PR's CI build payloads into the freshly deployed review
      # environment, so a deploy-review PR shows its own telemetry end to end.
      #
      # Trust boundary (pull_request_target): this job executes TRUSTED base-branch code —
      # the workspace root is the `github.sha` checkout; the untrusted PR head exists only
      # under review-source/ as a docker build context. The publish script is therefore
      # invoked from the trusted root checkout, never from review-source/, so a malicious
      # PR cannot alter the code that handles the review token. The payload files are
      # untrusted PR-produced data, but they are POSTed to a review server that already
      # runs that same PR's code — blast radius nil (plan 094 §3 trust model).
      #
      # Soft-fail contract: review copies are non-authoritative, and the ci.yml run for
      # this SHA may legitimately still be building (ordering race, plan 094 §5 — accepted).
      # Polling is bounded (~10×30 s, so the global review concurrency lock is never held
      # long); a missing run/artifact is a step-summary note and exit 0, never a red job.
      #
      # Ordering (defense-in-depth, 094 §3.2 review): this step extracts a PR-controlled
      # artifact zip (gh CLI extraction — the zip-slip class), so it deliberately runs
      # AFTER the job's last privileged action (the packages:write superseded-image
      # cleanup above): a hostile archive can no longer precede anything privileged here.
      - name: Publish CI payloads to the review environment
        if: env.REVIEW_ACTION == 'deploy' && steps.deploy.outcome == 'success'
        env:
          GH_TOKEN: "${{ github.token }}"
          SHA: "${{ env.REVIEW_SHA }}"
          BUILDHOUND_SERVER_URL: "${{ steps.deploy.outputs.dashboard_url }}"
          BUILDHOUND_TOKEN: "${{ steps.deploy.outputs.review_token }}"
        run: |
          set +e  # soft-fail contract: nothing below may redden a green deploy
          note() {
            echo "$1"
            echo "$1" >> "$GITHUB_STEP_SUMMARY"
          }
          run_id=""
          artifact_count=0
          for attempt in $(seq 1 10); do
            [ "$attempt" -gt 1 ] && sleep 30
            if [ -z "$run_id" ]; then
              candidate=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=1" --jq '.workflow_runs[0].id // empty' 2>/dev/null)
              case "$candidate" in
                ''|*[!0-9]*) continue ;;
                *) run_id="$candidate" ;;
              esac
            fi
            status=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status' 2>/dev/null)
            artifact_count=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts?per_page=100" --jq '[.artifacts[] | select(.name | startswith("buildhound-payload-"))] | length' 2>/dev/null)
            case "$artifact_count" in ''|*[!0-9]*) artifact_count=0 ;; esac
            # Stop when the CI run finished (its artifact set is final) or both expected
            # payloads (build + sample-springboot) are already uploaded (if: always()).
            if [ "$status" = "completed" ] || [ "$artifact_count" -ge 2 ]; then break; fi
          done
          if [ -z "$run_id" ]; then
            note "buildhound review publish: no ci.yml run found for $SHA (docs-only change or run not started) — review copy skipped (non-authoritative, plan 094)"
            exit 0
          fi
          if [ "$artifact_count" -eq 0 ]; then
            note "buildhound review publish: ci.yml run $run_id produced no buildhound-payload-* artifacts within the polling budget — review copy skipped (non-authoritative, plan 094)"
            exit 0
          fi
          # WARNING: keep the default per-artifact subdirectories (no flattening) — both
          # artifacts contain a file literally named build-payload.json and a flat dir
          # would silently collapse them to one.
          if ! gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --pattern 'buildhound-payload-*' --dir /tmp/review-ci-payloads; then
            note "buildhound review publish: artifact download failed — review copy skipped (non-authoritative, plan 094)"
            exit 0
          fi
          # Trusted-checkout script; token only via env → Authorization header. The script
          # itself soft-fails (exit 0) on 4xx/5xx/transport errors and re-POSTs are safe
          # (ingest dedups on (project_id, build_id)).
          find /tmp/review-ci-payloads -type f -name '*.json' -exec buildhound-ci-assets/bin/buildhound-publish {} +
          exit 0
      - name: Converge review environments (close/unlabel fast path)
        if: env.REVIEW_ACTION == 'retire'
        env:
          DOKPLOY_URL: "${{ vars.DOKPLOY_URL }}"
          DOKPLOY_TOKEN: "${{ secrets.DOKPLOY_TOKEN }}"
          ENVIRONMENT_ID: "${{ secrets.DOKPLOY_ENVIRONMENT_ID }}"
          DNS_SUFFIX: "${{ vars.BUILDHOUND_REVIEW_DNS_SUFFIX }}"
          TTL_HOURS: "${{ vars.BUILDHOUND_REVIEW_TTL_HOURS }}"
          GH_TOKEN: "${{ github.token }}"
        run: |
          # Plan 089: the event is only a latency optimization — the same
          # idempotent converge the cron runs, nothing bespoke.
          : "${TTL_HOURS:?BUILDHOUND_REVIEW_TTL_HOURS must be set}"
          deploy/dokploy/reconcile-reviews.sh
  reconcile_failed_review:
    needs: review
    if: >-
      ${{ always() &&
          (needs.review.result == 'cancelled' ||
           needs.review.outputs.deploy_outcome == 'cancelled' ||
           needs.review.outputs.publish_outcome == 'cancelled' ||
           needs.review.outputs.deploy_outcome == 'failure' ||
           needs.review.outputs.publish_outcome == 'failure' ||
           (needs.review.result == 'failure' &&
            needs.review.outputs.deploy_outcome == 'success')) }}
    runs-on: ubuntu-latest
    environment: review-cleanup
    concurrency: {group: review-environment-global, queue: max, cancel-in-progress: false}
    permissions: {contents: read, pull-requests: read, issues: read, actions: read, packages: write}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"
          persist-credentials: false
      - name: Converge review environments (failed-attempt fast path)
        env:
          DOKPLOY_URL: "${{ vars.DOKPLOY_URL }}"
          DOKPLOY_TOKEN: "${{ secrets.DOKPLOY_TOKEN }}"
          ENVIRONMENT_ID: "${{ secrets.DOKPLOY_ENVIRONMENT_ID }}"
          DNS_SUFFIX: "${{ vars.BUILDHOUND_REVIEW_DNS_SUFFIX }}"
          TTL_HOURS: "${{ vars.BUILDHOUND_REVIEW_TTL_HOURS }}"
          GH_TOKEN: "${{ github.token }}"
        run: |
          # Plan 089: exact-attempt scrub bookkeeping is gone. A failed
          # attempt on a still-open, still-labelled PR keeps its anchor and
          # images until the PR closes or unlabels; converge handles both.
          : "${TTL_HOURS:?BUILDHOUND_REVIEW_TTL_HOURS must be set}"
          deploy/dokploy/reconcile-reviews.sh
  record_review_status:
    needs: review
    if: ${{ always() && needs.review.result == 'success' && needs.review.outputs.deploy_outcome == 'success' }}
    runs-on: ubuntu-latest
    permissions: {actions: read, contents: read, statuses: write}
    steps:
      - uses: actions/download-artifact@v8
        with: {name: review-attestation, path: /tmp/review}
      - name: Validate attestation and record successful exact-SHA review
        env:
          GH_TOKEN: "${{ github.token }}"
          PR: "${{ env.REVIEW_PR }}"
          SHA: "${{ env.REVIEW_SHA }}"
          ATTEMPT_ID: "${{ github.run_id }}.${{ github.run_attempt }}"
          REVIEW_REQUEST_EVENT_ID: "${{ needs.review.outputs.review_request_event_id }}"
        run: |
          [[ "$REVIEW_REQUEST_EVENT_ID" =~ ^[1-9][0-9]*$ ]]
          jq -e -s --arg attemptId "$ATTEMPT_ID" --arg repository "$GITHUB_REPOSITORY" --arg runId "$GITHUB_RUN_ID" --argjson runAttempt "$GITHUB_RUN_ATTEMPT" \
            --argjson pr "$PR" --arg headSha "$SHA" --arg reviewRequestEventId "$REVIEW_REQUEST_EVENT_ID" '
            length == 1 and
            .[0] as $proof |
            ($proof | type) == "object" and
            ($proof | keys) == ["attemptId","composeId","deploymentId","headSha","pr","repository","reviewRequestEventId","runAttempt","runId","schema","serverDigest","serverImage","siteDigest","siteImage"] and
            $proof.schema == 1 and $proof.repository == $repository and
            $proof.runId == $runId and $proof.runAttempt == $runAttempt and $proof.attemptId == $attemptId and
            $proof.pr == $pr and $proof.headSha == $headSha and
            $proof.reviewRequestEventId == $reviewRequestEventId and
            ($proof.composeId | type) == "string" and ($proof.composeId | test("^[A-Za-z0-9_-]{1,128}\\z")) and
            ($proof.deploymentId | type) == "string" and ($proof.deploymentId | test("^[A-Za-z0-9_-]{1,128}\\z")) and
            ($proof.serverImage | type) == "string" and ($proof.serverImage | test("@sha256:[0-9a-f]{64}\\z")) and
            ($proof.siteImage | type) == "string" and ($proof.siteImage | test("@sha256:[0-9a-f]{64}\\z")) and
            ($proof.serverDigest | type) == "string" and ($proof.serverDigest | test("^sha256:[0-9a-f]{64}\\z")) and
            ($proof.siteDigest | type) == "string" and ($proof.siteDigest | test("^sha256:[0-9a-f]{64}\\z")) and
            ($proof.serverImage | endswith("@" + $proof.serverDigest)) and
            ($proof.siteImage | endswith("@" + $proof.siteDigest))
          ' /tmp/review/review.json >/dev/null
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/$SHA" \
            -f state=success \
            -f context="buildhound/review-deployed/pr-$PR" \
            -f description='Protected review deployment passed' \
            -f target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >/dev/null
  record_failed_review_status:
    needs: [review, record_review_status]
    if: >-
      always() &&
      (github.event.action == 'labeled' && github.event.label.name == 'deploy-review' ||
       (github.event.action == 'synchronize' || github.event.action == 'reopened') &&
       contains(github.event.pull_request.labels.*.name, 'deploy-review')) &&
      (needs.review.result != 'success' || needs.record_review_status.result != 'success')
    runs-on: ubuntu-latest
    permissions: {contents: read, statuses: write}
    steps:
      - name: Record failed exact-SHA review deployment
        env:
          GH_TOKEN: "${{ github.token }}"
          PR: "${{ env.REVIEW_PR }}"
          SHA: "${{ env.REVIEW_SHA }}"
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/$SHA" \
            -f state=failure \
            -f context="buildhound/review-deployed/pr-$PR" \
            -f description='Protected review deployment failed' \
            -f target_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >/dev/null
