name: Build review images
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions: {contents: read, packages: write}
jobs:
  build:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy: {fail-fast: false, matrix: {image: [server, site]}}
    steps:
      - uses: actions/checkout@v4
        with: {ref: "${{ github.event.pull_request.head.sha }}"}
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image == 'server' && 'buildhound-server/Dockerfile' || 'site/Dockerfile' }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/buildhound-${{ matrix.image }}:pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          provenance: true
          sbom: true
