name: CI

# Markdown-only changes can't affect a build/test outcome, so skip the whole workflow
# for them to save runner minutes — this also makes plan-commit PRs (docs/plans/NNN-*.md)
# free. paths-ignore skips only when EVERY changed file matches; a docs change alongside
# any code still runs CI. Deliberately NARROW to markdown (+ LICENSE): docs/ is NOT
# docs-only — docs/api/openapi.yaml is copied into the server jar + OCI image and guarded
# by OpenApiContractTest / DocsRoutesTest / the image smoke test, so it must still trigger
# CI. '**/*.md' covers markdown under docs/ (spec, roadmap, plans); root + nested both
# listed because '**/*.md' does not match root-level files on its own. Safe today because
# no branch protection / ruleset marks these jobs as required status checks (a skipped
# required check would otherwise wedge merges — revisit this filter if that changes).
on:
  push:
    branches: [main]
    paths-ignore: &docs-only
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore: *docs-only

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      # Caches the Gradle user home (dependencies, local build cache, provisioned
      # JDKs). Write from every branch — the long-lived feature branches never run
      # on main, so the default main-only policy would leave the cache empty.
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      # Runs unit tests, TestKit functional tests, and plugin validation, with the
      # configuration cache enabled (gradle.properties). The plugin's test tasks use
      # a JDK 21 launcher (plan 011) — the toolchain resolver provisions it.
      - name: Build
        run: gradle build

      # ci-assets is not a Gradle module, so its shell is checked here (plan 025):
      # shellcheck the metric CLI + run its stubbed-curl harness (no network).
      - name: CI-assets shell checks
        run: |
          shellcheck buildhound-ci-assets/bin/buildhound-metric buildhound-ci-assets/test/metric-cli-test.sh
          sh buildhound-ci-assets/test/metric-cli-test.sh

  build-floor:
    name: Build & test (Gradle 8.14 floor)
    # 8.14.4+: KGP requires it when compiling with a JDK 26 toolchain (plan 011).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Gradle 8.14 cannot RUN on JDK 26 (plan 011) — install 26 for the build
      # toolchain, and 21 LAST so it stays JAVA_HOME and launches Gradle.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            26
            21

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.4"
          cache-read-only: false

      # The support floor runs Gradle's embedded Kotlin 2.0 stdlib — the apiVersion
      # pin (architecture §2 rule 10) is only proven by actually testing on it.
      - name: Build on floor Gradle
        run: gradle build

  server-image:
    name: Server OCI image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      # BuildKit layer cache persisted in the GitHub Actions cache: the dependency
      # layers (wrapper + build scripts, Dockerfile lines up to the priming RUN)
      # only rebuild when the build configuration changes. load: true keeps the
      # image in the local daemon for the smoke test below.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: buildhound-server/Dockerfile
          tags: buildhound-server:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run -d --rm --name buildhound-server -p 8080:8080 buildhound-server:${{ github.sha }}
          # Wait for liveness.
          healthy=0
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health >/dev/null; then healthy=1; break; fi
            sleep 1
          done
          if [ "$healthy" != 1 ]; then
            echo "server did not become healthy" >&2
            docker logs buildhound-server >&2
            exit 1
          fi
          # Runtime-resource smoke: the dashboard + docs load resources from the classpath at class
          # init, so a resource missing from the image only surfaces on these routes, never on /health
          # (this is exactly the bundling regression that shipped once — guard it here). -f fails on 5xx.
          for path in / /timeline.js /dashboard.js /openapi.yaml /docs; do
            if ! curl -fsS "http://localhost:8080$path" >/dev/null; then
              echo "resource endpoint $path did not return 2xx (a bundled resource is likely missing)" >&2
              docker logs buildhound-server >&2
              exit 1
            fi
          done
          echo "smoke ok: /health + dashboard + docs resources served"

  image-scan:
    name: Image scan + SBOM (non-blocking)
    # Advisory (plan 042, arch §4.7): surfaces CVEs + an SBOM as artifacts without gating merges.
    # continue-on-error keeps the workflow green while the scan matures; a real release pipeline
    # promotes this to blocking + adds cosign signing. Action tags are refreshed alongside the bases.
    needs: server-image
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      # Rebuild from the gha layer cache the server-image job populated (fast; no source rebuild).
      - name: Build image (from cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: buildhound-server/Dockerfile
          tags: buildhound-server:scan
          load: true
          cache-from: type=gha

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: buildhound-server:scan
          format: table
          ignore-unfixed: true
          output: trivy-report.txt

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: buildhound-server:scan
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload scan report + SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: image-scan
          path: |
            trivy-report.txt
            sbom.spdx.json

  functional-cc-off:
    name: Functional tests (config cache off)
    # Blocking CC-off axis (plan 021): the whole functional suite re-runs with inner-build
    # CC off. CC-off failure modes don't vary by OS/floor, so one leg, not a cross-product.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Functional tests with inner-build configuration cache off
        run: gradle :buildhound-gradle-plugin:functionalTest -Pbuildhound.testkit.cc=off

  isolated-projects:
    name: Isolated projects (watched)
    # Watched, non-blocking (roadmap guardrail): the workflow stays green; this job may show
    # red while the incubating org.gradle.unsafe.isolated-projects flag settles. Per-collector
    # degradation is enforced by blocking tests in the default suite, not here.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Isolated-projects TestKit suite
        run: gradle :buildhound-gradle-plugin:isolatedProjectsTest

  build-macos:
    name: Build & test (macOS)
    # Blocking (plan 021): plan 007's only field bug was macOS-only (scrubber path handling),
    # covered by these unit + functional tests. Testcontainers self-skips without Docker, so
    # `gradle build` is viable on the Docker-less macOS runner. One leg, no floor cross-product.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Build
        run: gradle build

  overhead-budget:
    name: Plugin overhead budget (watched)
    # Watched, non-blocking (plan 034): same-machine timing on shared runners is noisy, so the job
    # stays green-optional until runner-to-runner variance is characterised — the promote-to-blocking
    # criterion lives in docs/overhead-budget.md. It runs gradle-profiler on a synthetic fixture with
    # the plugin toggled on/off and fails on a budget breach (OverheadCalculator, buildhound-commons).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      # 26 for the build toolchain, 21 LAST so it launches Gradle (matches `build`, plan 011).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            26
            21

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      # Version + SHA-256 pinned at authoring time (Maven Central is gradle-profiler's distribution;
      # the GitHub release carries no zip). The checksum makes a re-pointed tag or swapped asset a
      # loud failure, not a silent binary swap — a bump is a deliberate, reviewed change of both.
      - name: Install gradle-profiler
        env:
          PROFILER_VERSION: "0.24.0"
          PROFILER_SHA256: "74f39882a444d6d5616d35b3e9197f7423cd252f63f339bd3e01f662573b319c"
        run: |
          curl -fsSL -o gradle-profiler.zip \
            "https://repo1.maven.org/maven2/org/gradle/profiler/gradle-profiler/${PROFILER_VERSION}/gradle-profiler-${PROFILER_VERSION}.zip"
          echo "${PROFILER_SHA256}  gradle-profiler.zip" | sha256sum -c -
          unzip -q gradle-profiler.zip
          echo "$PWD/gradle-profiler-${PROFILER_VERSION}/bin" >> "$GITHUB_PATH"

      # GitHub's default bash sets `-o pipefail`, so a budget breach (non-zero) propagates through tee.
      - name: Run overhead harness
        run: buildhound-ci-assets/overhead/run-overhead.sh | tee overhead-table.md

      - name: Upload overhead table
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overhead-budget
          path: |
            overhead-table.md
            buildhound-ci-assets/overhead/build/on/benchmark.csv
            buildhound-ci-assets/overhead/build/off/benchmark.csv
          if-no-files-found: warn

  build-windows:
    name: Build & test (Windows, watched)
    # Watched canary (plan 021): the OS-sensitive surfaces are the scrubber, spool paths, and
    # VCS exec. Known gaps: the hung-git fixture and GitExec fixtures are @DisabledOnOs(WINDOWS)
    # (plan 015). Promote-or-defer criteria in the architecture decision log.
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Build
        run: gradle build
