name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      # Caches the Gradle user home (dependencies, local build cache, provisioned
      # JDKs). Write from every branch — the long-lived feature branches never run
      # on main, so the default main-only policy would leave the cache empty.
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      # Runs unit tests, TestKit functional tests, and plugin validation, with the
      # configuration cache enabled (gradle.properties). The plugin's test tasks use
      # a JDK 21 launcher (plan 011) — the toolchain resolver provisions it.
      - name: Build
        run: gradle build

  build-floor:
    name: Build & test (Gradle 8.14 floor)
    # 8.14.4+: KGP requires it when compiling with a JDK 26 toolchain (plan 011).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Gradle 8.14 cannot RUN on JDK 26 (plan 011) — install 26 for the build
      # toolchain, and 21 LAST so it stays JAVA_HOME and launches Gradle.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            26
            21

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.4"
          cache-read-only: false

      # The support floor runs Gradle's embedded Kotlin 2.0 stdlib — the apiVersion
      # pin (architecture §2 rule 10) is only proven by actually testing on it.
      - name: Build on floor Gradle
        run: gradle build

  server-image:
    name: Server OCI image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      # BuildKit layer cache persisted in the GitHub Actions cache: the dependency
      # layers (wrapper + build scripts, Dockerfile lines up to the priming RUN)
      # only rebuild when the build configuration changes. load: true keeps the
      # image in the local daemon for the smoke test below.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: buildhound-server/Dockerfile
          tags: buildhound-server:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run -d --rm --name buildhound-server -p 8080:8080 buildhound-server:${{ github.sha }}
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health; then exit 0; fi
            sleep 1
          done
          echo "server did not become healthy" >&2
          docker logs buildhound-server >&2
          exit 1

  functional-cc-off:
    name: Functional tests (config cache off)
    # Blocking CC-off axis (plan 021): the whole functional suite re-runs with inner-build
    # CC off. CC-off failure modes don't vary by OS/floor, so one leg, not a cross-product.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Functional tests with inner-build configuration cache off
        run: gradle :buildhound-gradle-plugin:functionalTest -Pbuildhound.testkit.cc=off

  isolated-projects:
    name: Isolated projects (watched)
    # Watched, non-blocking (roadmap guardrail): the workflow stays green; this job may show
    # red while the incubating org.gradle.unsafe.isolated-projects flag settles. Per-collector
    # degradation is enforced by blocking tests in the default suite, not here.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Isolated-projects TestKit suite
        run: gradle :buildhound-gradle-plugin:isolatedProjectsTest

  build-macos:
    name: Build & test (macOS)
    # Blocking (plan 021): plan 007's only field bug was macOS-only (scrubber path handling),
    # covered by these unit + functional tests. Testcontainers self-skips without Docker, so
    # `gradle build` is viable on the Docker-less macOS runner. One leg, no floor cross-product.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Build
        run: gradle build

  build-windows:
    name: Build & test (Windows, watched)
    # Watched canary (plan 021): the OS-sensitive surfaces are the scrubber, spool paths, and
    # VCS exec. Known gaps: the hung-git fixture and GitExec fixtures are @DisabledOnOs(WINDOWS)
    # (plan 015). Promote-or-defer criteria in the architecture decision log.
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Build
        run: gradle build
