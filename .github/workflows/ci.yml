name: CI

# Markdown-only changes can't affect a build/test outcome, so skip the whole workflow
# for them to save runner minutes — this also makes plan-commit PRs (docs/plans/NNN-*.md)
# free. paths-ignore skips only when EVERY changed file matches; a docs change alongside
# any code still runs CI. Deliberately NARROW to markdown (+ LICENSE): docs/ is NOT
# docs-only — docs/api/openapi.yaml is copied into the server jar + OCI image and guarded
# by OpenApiContractTest / DocsRoutesTest / the image smoke test, so it must still trigger
# CI. '**/*.md' covers markdown under docs/ (spec, roadmap, plans); root + nested both
# listed because '**/*.md' does not match root-level files on its own. Safe today because
# no branch protection / ruleset marks these jobs as required status checks (a skipped
# required check would otherwise wedge merges — revisit this filter if that changes).
on:
  push:
    branches: [main]
    paths-ignore: &docs-only
      - '*.md'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore: *docs-only

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Semantic validation for every workflow, including release-only keys/expressions that a
      # generic YAML parser cannot check. This job receives no deployment environment or secrets.
      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0
        with:
          version: 1.7.12
          shellcheck: true
          pyflakes: false

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      # Caches the Gradle user home (dependencies, local build cache, provisioned
      # JDKs). Write from every branch — the long-lived feature branches never run
      # on main, so the default main-only policy would leave the cache empty.
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      # Dogfooding bootstrap (plan 093): the root build cannot includeBuild itself, so the
      # candidate plugin is published to mavenLocal first and injected into the real build
      # below via the CI-only init script (the Develocity/CCUD injection pattern). This
      # consumes the same shaded publication the Portal release ships, so publication
      # drift surfaces here first.
      - name: Publish plugin to mavenLocal (dogfood bootstrap)
        run: gradle :buildhound-gradle-plugin:publishToMavenLocal

      # Runs unit tests, TestKit functional tests, and plugin validation, with the
      # configuration cache enabled (gradle.properties). The plugin's test tasks use
      # a JDK 21 launcher (plan 011) — the toolchain resolver provisions it.
      # The -I flag applies the just-published plugin to this build only (plan 093).
      # Local `gradle build` without -I is unchanged.
      #
      # Production publication (plan 094): the init script wires server.url/server.token
      # from these env vars via providers.environmentVariable(...); the in-plugin upload
      # keeps the spool/retry path, so prod is the loss-protected copy of every CI build.
      #  - Fork PRs: secrets are never exposed to fork runs, and the URL is blanked
      #    explicitly below — repo *variables*, unlike secrets, are readable from fork
      #    runs, and an URL without a token would make the plugin attempt (and soft-fail)
      #    an unauthenticated upload instead of skipping. With both empty, UploadGate
      #    skips with "no server configured" — that skip IS the fork gate (plan 094 §2);
      #    no separate same-repo job conditional is needed.
      #  - Variable/secret not yet minted: same clean skip, so this YAML is safe to merge
      #    before the owner creates BUILDHOUND_PROD_SERVER_URL /
      #    BUILDHOUND_PROD_INGEST_TOKEN (plan 094 §6).
      #  - Prod ingest token in same-repo PR context: accepted owner decision
      #    (plan 094 §5) — ingest-scope only, fork-excluded, revocable.
      - name: Build
        env:
          BUILDHOUND_SERVER_URL: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && vars.BUILDHOUND_PROD_SERVER_URL || '' }}
          BUILDHOUND_TOKEN: ${{ secrets.BUILDHOUND_PROD_INGEST_TOKEN }}
        run: gradle build -I .github/buildhound-dogfood.init.gradle.kts

      # The plugin writes the payload even when the build fails (spec §3.2), so upload it
      # always; plan 094 consumes these artifacts for multi-env publication.
      - name: Upload BuildHound payload
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: buildhound-payload-build
          path: build/buildhound/build-payload.json
          if-no-files-found: warn
          retention-days: 7

      # ci-assets is not a Gradle module, so its shell is checked here (plan 025):
      # shellcheck the metric CLI + run its stubbed-curl harness (no network), and
      # shellcheck + run the wrapper-integrity harness (plan 066) that mirrors the
      # Azure template's validateWrapper step.
      - name: CI-assets shell checks
        run: |
          shellcheck buildhound-ci-assets/bin/buildhound-metric buildhound-ci-assets/test/metric-cli-test.sh
          sh buildhound-ci-assets/test/metric-cli-test.sh
          shellcheck buildhound-ci-assets/bin/buildhound-publish buildhound-ci-assets/test/publish-cli-test.sh
          sh buildhound-ci-assets/test/publish-cli-test.sh
          shellcheck buildhound-ci-assets/test/wrapper-integrity-test.sh
          sh buildhound-ci-assets/test/wrapper-integrity-test.sh
          shellcheck .github/scripts/gradle-plugin-publication-digest.sh
          shellcheck .github/scripts/verify-gradle-plugin-publication-digest.sh

  sample-springboot:
    name: Sample build (springboot-legacy)
    # Dogfooding (plan 093): the JVM-only sample consumes the head-of-branch plugin from
    # source (its settings already does pluginManagement { includeBuild("../..") }), giving
    # a second real telemetry payload per PR. The sample's demo server.url points at
    # localhost, so the in-CI upload attempt fails soft (warn + spool) — collection and the
    # payload artifact are unaffected, and no credential exists in this job.
    runs-on: ubuntu-latest
    # First CI outing for a 52-module build that deliberately runs with -Xmx1g, no build
    # cache, and no parallelism — don't let a pathological run ride the 360-min platform
    # default (same rationale as build-windows below).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Build sample
        working-directory: samples/springboot-legacy
        run: gradle build

      # Same contract as the build job's payload artifact: written even on failure
      # (spec §3.2), consumed by plan 094. Path is relative to the workspace root, not
      # the job step's working-directory.
      - name: Upload BuildHound payload
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: buildhound-payload-sample-springboot
          path: samples/springboot-legacy/build/buildhound/build-payload.json
          if-no-files-found: warn
          retention-days: 7

  publish-staging:
    name: Publish payloads (staging)
    # Plan 094: replay the plan-093 payload artifacts to the staging environment. Staging
    # copies are non-authoritative — prod already got a direct, spool-backed upload in
    # `build` — so this whole job is advisory by design:
    #  - Same-repo PRs and pushes to main only. Fork PRs get no secrets, so the job is
    #    skipped outright instead of running a guaranteed no-op (plan 094 §2 matrix).
    #  - Plain `needs` semantics: if a producer job fails, this job is skipped — the
    #    failed build's payload still reaches prod via the in-build upload; staging
    #    misses it, accepted (non-authoritative copy).
    #  - The publish script exits 0 on missing env (credentials not yet minted — this
    #    YAML is merge-safe before the owner creates BUILDHOUND_STAGING_SERVER_URL /
    #    BUILDHOUND_STAGING_INGEST_TOKEN), on 4xx, and on an unreachable staging: a dead
    #    staging must never redden a PR.
    #  - continue-on-error additionally keeps step-level infrastructure failures
    #    (checkout, artifact download) from reddening the PR — the image-scan advisory
    #    precedent; gh-ci-babysitter surfaces continue-on-error failures, so breakage
    #    stays visible instead of silently green.
    needs: [build, sample-springboot]
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      # Both producer jobs upload if: always() with if-no-files-found: warn, so either
      # artifact may be missing; the pattern download tolerates that (zero matches is
      # not an error) and the find below handles an empty result.
      - name: Download payload artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: buildhound-payload-*
          path: payloads

      # Token only via env → Authorization header inside the script — never argv, never
      # echoed (tokens are masked in logs, but that is not relied upon).
      - name: Publish payloads to staging
        env:
          BUILDHOUND_SERVER_URL: ${{ vars.BUILDHOUND_STAGING_SERVER_URL }}
          BUILDHOUND_TOKEN: ${{ secrets.BUILDHOUND_STAGING_INGEST_TOKEN }}
        run: |
          mkdir -p payloads
          count=$(find payloads -type f -name '*.json' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "no buildhound-payload-* artifacts to publish (producer jobs uploaded none)"
            exit 0
          fi
          find payloads -type f -name '*.json' -exec buildhound-ci-assets/bin/buildhound-publish {} +

  build-floor:
    name: Build & test (Gradle 8.14 floor)
    # 8.14.4+: KGP requires it when compiling with a JDK 26 toolchain (plan 011).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Gradle 8.14 cannot RUN on JDK 26 (plan 011) — install 26 for the build
      # toolchain, and 21 LAST so it stays JAVA_HOME and launches Gradle.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            26
            21

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.14.4"
          cache-read-only: false

      # The support floor runs Gradle's embedded Kotlin 2.0 stdlib — the apiVersion
      # pin (architecture §2 rule 10) is only proven by actually testing on it.
      - name: Build on floor Gradle
        run: gradle build

  server-image:
    name: Server OCI image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # BuildKit layer cache persisted in the GitHub Actions cache: the dependency
      # layers (wrapper + build scripts, Dockerfile lines up to the priming RUN)
      # only rebuild when the build configuration changes. load: true keeps the
      # image in the local daemon for the smoke test below.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: buildhound-server/Dockerfile
          tags: buildhound-server:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run -d --rm --name buildhound-server -p 8080:8080 buildhound-server:${{ github.sha }}
          # Wait for liveness.
          healthy=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/health >/dev/null; then healthy=1; break; fi
            sleep 1
          done
          if [ "$healthy" != 1 ]; then
            echo "server did not become healthy" >&2
            docker logs buildhound-server >&2
            exit 1
          fi
          # Runtime-resource smoke: the dashboard + docs load resources from the classpath at class
          # init, so a resource missing from the image only surfaces on these routes, never on /health
          # (this is exactly the bundling regression that shipped once — guard it here). -f fails on 5xx.
          for path in / /timeline.js /dashboard.js /openapi.yaml /docs; do
            if ! curl -fsS "http://localhost:8080$path" >/dev/null; then
              echo "resource endpoint $path did not return 2xx (a bundled resource is likely missing)" >&2
              docker logs buildhound-server >&2
              exit 1
            fi
          done
          echo "smoke ok: /health + dashboard + docs resources served"

  image-scan:
    name: Image scan + SBOM (non-blocking)
    # Advisory (plan 042, arch §4.7): surfaces CVEs + an SBOM as artifacts without gating merges.
    # continue-on-error keeps the workflow green while the scan matures; a real release pipeline
    # promotes this to blocking + adds cosign signing. Action tags are refreshed alongside the bases.
    needs: server-image
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      # Rebuild from the gha layer cache the server-image job populated (fast; no source rebuild).
      - name: Build image (from cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: buildhound-server/Dockerfile
          tags: buildhound-server:scan
          load: true
          cache-from: type=gha

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: buildhound-server:scan
          format: table
          ignore-unfixed: true
          output: trivy-report.txt

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0.24.0
        with:
          image: buildhound-server:scan
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload scan report + SBOM
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: image-scan
          path: |
            trivy-report.txt
            sbom.spdx.json

  functional-cc-off:
    name: Functional tests (config cache off)
    # Blocking CC-off axis (plan 021): the whole functional suite re-runs with inner-build
    # CC off. CC-off failure modes don't vary by OS/floor, so one leg, not a cross-product.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Functional tests with inner-build configuration cache off
        run: gradle :buildhound-gradle-plugin:functionalTest -Pbuildhound.testkit.cc=off

  isolated-projects:
    name: Isolated projects (watched)
    # Watched, non-blocking (roadmap guardrail): the workflow stays green; this job may show
    # red while the incubating org.gradle.unsafe.isolated-projects flag settles. Per-collector
    # degradation is enforced by blocking tests in the default suite, not here.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Isolated-projects TestKit suite
        run: gradle :buildhound-gradle-plugin:isolatedProjectsTest

  build-macos:
    name: Build & test (macOS)
    # Blocking (plan 021): plan 007's only field bug was macOS-only (scrubber path handling),
    # covered by these unit + functional tests. Testcontainers self-skips without Docker, so
    # `gradle build` is viable on the Docker-less macOS runner. One leg, no floor cross-product.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Build
        run: gradle build

  overhead-budget:
    name: Plugin overhead budget (watched)
    # Watched, non-blocking (plan 034): same-machine timing on shared runners is noisy, so the job
    # stays green-optional until runner-to-runner variance is characterised — the promote-to-blocking
    # criterion lives in docs/overhead-budget.md. It runs gradle-profiler on a synthetic fixture with
    # the plugin toggled on/off and fails on a budget breach (OverheadCalculator, buildhound-commons).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      # 26 for the build toolchain, 21 LAST so it launches Gradle (matches `build`, plan 011).
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            26
            21

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      # Version + SHA-256 pinned at authoring time (Maven Central is gradle-profiler's distribution;
      # the GitHub release carries no zip). The checksum makes a re-pointed tag or swapped asset a
      # loud failure, not a silent binary swap — a bump is a deliberate, reviewed change of both.
      - name: Install gradle-profiler
        env:
          PROFILER_VERSION: "0.24.0"
          PROFILER_SHA256: "74f39882a444d6d5616d35b3e9197f7423cd252f63f339bd3e01f662573b319c"
        run: |
          curl -fsSL -o gradle-profiler.zip \
            "https://repo1.maven.org/maven2/org/gradle/profiler/gradle-profiler/${PROFILER_VERSION}/gradle-profiler-${PROFILER_VERSION}.zip"
          echo "${PROFILER_SHA256}  gradle-profiler.zip" | sha256sum -c -
          unzip -q gradle-profiler.zip
          echo "$PWD/gradle-profiler-${PROFILER_VERSION}/bin" >> "$GITHUB_PATH"

      # GitHub's default bash sets `-o pipefail`, so a budget breach (non-zero) propagates through tee.
      - name: Run overhead harness
        run: buildhound-ci-assets/overhead/run-overhead.sh | tee overhead-table.md

      - name: Upload overhead table
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: overhead-budget
          path: |
            overhead-table.md
            buildhound-ci-assets/overhead/build/on/benchmark.csv
            buildhound-ci-assets/overhead/build/off/benchmark.csv
          if-no-files-found: warn

  build-windows:
    name: Build & test (Windows)
    # Blocking since plan 092, which supersedes plan 021's statistical promote bar ("green
    # ~2 weeks of PRs") with a root-cause justification: the daemon-locked-GUH @TempDir
    # failures — the job's only red — were structurally fixed, not just observed green once
    # (see the architecture decision log, 2026-07-16). OS-sensitive surfaces guarded here:
    # scrubber, spool paths, VCS exec. Known accepted gaps: the hung-git and GitExec
    # fixtures are @DisabledOnOs(WINDOWS) (plan 015). Re-demotable with a one-line revert
    # if unrelated Windows flakiness surfaces.
    runs-on: windows-latest
    # Green runs take ~36 min; the leg's known failure mode is a lingering TestKit daemon,
    # so don't let a hang ride the 360-min platform default now that the job is blocking.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "9.6.1"
          cache-read-only: false

      - name: Build
        run: gradle build
