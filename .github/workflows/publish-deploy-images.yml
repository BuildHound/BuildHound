name: Publish deployment images
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - build.gradle.kts
      - settings.gradle.kts
      - gradle.properties
      - gradlew
      - gradle/**
      - .dockerignore
      - buildhound-commons/**
      - buildhound-server/**
      - buildhound-report/**
      - buildhound-gradle-plugin/build.gradle.kts
      - buildhound-internal-adapters/build.gradle.kts
      - docs/api/openapi.yaml
      - site/**
      - deploy/dokploy/**
      - .github/workflows/publish-deploy-images.yml
permissions: {contents: read, packages: write}
env:
  IMAGE_REGISTRY_PREFIX: ghcr.io/buildhound
concurrency:
  group: publish-deploy-${{ github.sha }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    strategy: {fail-fast: false, matrix: {image: [server, site, backup, db]}}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - uses: docker/setup-buildx-action@v3
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image == 'server' && 'buildhound-server/Dockerfile' || matrix.image == 'site' && 'site/Dockerfile' || matrix.image == 'backup' && 'deploy/dokploy/backup/Dockerfile' || 'deploy/dokploy/db/Dockerfile' }}
          push: true
          tags: ${{ env.IMAGE_REGISTRY_PREFIX }}/buildhound-${{ matrix.image }}:${{ github.sha }}
          provenance: true
          sbom: true
      - name: Record immutable reference
        run: printf '%s\n' '${{ env.IMAGE_REGISTRY_PREFIX }}/buildhound-${{ matrix.image }}@${{ steps.build.outputs.digest }}' > image-${{ matrix.image }}.txt
      - uses: actions/upload-artifact@v4
        with: {name: "image-${{ matrix.image }}", path: "image-${{ matrix.image }}.txt", retention-days: 14}
  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {pattern: "image-*", merge-multiple: true}
      - name: Build canonical release BOM
        run: |
          python3 deploy/dokploy/render-release.py --source-commit "$GITHUB_SHA" --server-image "$(cat image-server.txt)" --site-image "$(cat image-site.txt)" --backup-image "$(cat image-backup.txt)" --postgres-image "$(cat image-db.txt)" --manifest deploy/dokploy/stack.yaml --volume-guard deploy/dokploy/volume-guard.sh --migrations-dir buildhound-server/src/main/resources/db/migration
          python3 deploy/dokploy/dokploy.py release-id release.json >/dev/null
          mkdir release-artifact
          cp release.json deploy/dokploy/stack.yaml deploy/dokploy/volume-guard.sh release-artifact/
      - uses: actions/upload-artifact@v4
        with: {name: "release-${{ github.sha }}", path: release-artifact, retention-days: 90}
