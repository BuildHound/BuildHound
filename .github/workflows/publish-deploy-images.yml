name: Publish deployment images
on:
  push:
    branches: [main]
permissions: {contents: read, pull-requests: read}
env:
  IMAGE_REGISTRY_PREFIX: ghcr.io/buildhound
concurrency:
  # Share the review lifecycle lock so an exact-owned review package version
  # cannot acquire a release tag between GC verification and deletion.
  group: review-environment-global
  queue: max
  cancel-in-progress: false
jobs:
  qualify:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.pr.outputs.deploy }}
    steps:
      - id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          pulls=$(gh api "repos/${GITHUB_REPOSITORY}/commits/$GITHUB_SHA/pulls")
          count=$(jq -er --arg repository "$GITHUB_REPOSITORY" --arg base "$DEFAULT_BRANCH" --arg sha "$GITHUB_SHA" '
            [.[] | select(
              .merged_at != null and .merge_commit_sha == $sha and
              .head.repo.full_name == $repository and .base.repo.full_name == $repository and
              .base.ref == $base
            )] | length
          ' <<<"$pulls")
          if [ "$count" -ne 1 ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pr=$(jq -er --arg repository "$GITHUB_REPOSITORY" --arg base "$DEFAULT_BRANCH" --arg sha "$GITHUB_SHA" '
            [.[] | select(
              .merged_at != null and .merge_commit_sha == $sha and
              .head.repo.full_name == $repository and .base.repo.full_name == $repository and
              .base.ref == $base
            )][0].number
          ' <<<"$pulls")
          if gh api "repos/${GITHUB_REPOSITORY}/issues/$pr/labels" --jq '.[].name' | grep -Fx deploy-review; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi
  publish:
    needs: qualify
    if: needs.qualify.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    permissions: {contents: read, packages: write}
    strategy: {fail-fast: false, matrix: {image: [server, site, backup, db]}}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - uses: docker/setup-buildx-action@v3
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image == 'server' && 'buildhound-server/Dockerfile' || matrix.image == 'site' && 'site/Dockerfile' || matrix.image == 'backup' && 'deploy/dokploy/backup/Dockerfile' || 'deploy/dokploy/db/Dockerfile' }}
          push: true
          tags: ${{ env.IMAGE_REGISTRY_PREFIX }}/buildhound-${{ matrix.image }}:${{ github.sha }}
          provenance: true
          sbom: true
      - name: Record immutable reference
        run: printf '%s\n' '${{ env.IMAGE_REGISTRY_PREFIX }}/buildhound-${{ matrix.image }}@${{ steps.build.outputs.digest }}' > image-${{ matrix.image }}.txt
      - uses: actions/upload-artifact@v4
        with: {name: "image-${{ matrix.image }}", path: "image-${{ matrix.image }}.txt", retention-days: 14}
  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions: {actions: read, contents: read}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {pattern: "image-*", merge-multiple: true}
      - name: Build canonical release BOM
        run: |
          python3 deploy/dokploy/render-release.py --source-commit "$GITHUB_SHA" --server-image "$(cat image-server.txt)" --site-image "$(cat image-site.txt)" --backup-image "$(cat image-backup.txt)" --postgres-image "$(cat image-db.txt)" --production-manifest deploy/dokploy/stack.yaml --staging-manifest deploy/dokploy/staging-stack.yaml --volume-guard deploy/dokploy/volume-guard.sh --migrations-dir buildhound-server/src/main/resources/db/migration
          bash deploy/dokploy/dokploy.sh release-id release.json >/dev/null
          mkdir release-artifact
          cp release.json deploy/dokploy/stack.yaml deploy/dokploy/staging-stack.yaml deploy/dokploy/volume-guard.sh release-artifact/
      - uses: actions/upload-artifact@v4
        with: {name: "release-${{ github.sha }}", path: release-artifact, retention-days: 90}
