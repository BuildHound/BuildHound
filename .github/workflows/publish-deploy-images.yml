name: Publish deployment images
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [buildhound-server/**, site/**, deploy/dokploy/backup/**, .github/workflows/publish-deploy-images.yml]
permissions: {contents: read, packages: write}
concurrency:
  group: publish-deploy-${{ github.sha }}
  cancel-in-progress: false
jobs:
  publish:
    runs-on: ubuntu-latest
    strategy: {fail-fast: false, matrix: {image: [server, site, backup]}}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: {registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}"}
      - uses: docker/setup-buildx-action@v3
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image == 'server' && 'buildhound-server/Dockerfile' || matrix.image == 'site' && 'site/Dockerfile' || 'deploy/dokploy/backup/Dockerfile' }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/buildhound-${{ matrix.image }}:${{ github.sha }}
          provenance: true
          sbom: true
      - name: Record immutable reference
        run: printf '%s\n' 'ghcr.io/${{ github.repository_owner }}/buildhound-${{ matrix.image }}@${{ steps.build.outputs.digest }}' > image-${{ matrix.image }}.txt
      - uses: actions/upload-artifact@v4
        with: {name: "image-${{ matrix.image }}", path: "image-${{ matrix.image }}.txt", retention-days: 14}
  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: {pattern: "image-*", merge-multiple: true}
      - name: Build canonical release BOM
        run: |
          migration=$(find buildhound-server/src/main/resources/db/migration -type f -name 'V*__*.sql' -printf '%f\n' | sort -V | tail -1 | sed 's/\.sql$//')
          python3 deploy/dokploy/render-release.py --source-commit "$GITHUB_SHA" --server-image "$(cat image-server.txt)" --site-image "$(cat image-site.txt)" --backup-image "$(cat image-backup.txt)" --postgres-image 'timescale/timescaledb:latest-pg16@sha256:ba149561ad4ddff5940d6eb0a0df60aefd1355cee1a450928f271267038fc888' --manifest deploy/dokploy/stack.yaml --migration-id "$migration"
      - uses: actions/upload-artifact@v4
        with: {name: "release-${{ github.sha }}", path: release.json, retention-days: 90}
