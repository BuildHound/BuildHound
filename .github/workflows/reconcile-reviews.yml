name: Reconcile review environments
on:
  schedule: [{cron: "17 * * * *"}]
  workflow_dispatch:
permissions: {contents: read, pull-requests: read, actions: read, packages: write}
jobs:
  reconcile:
    runs-on: ubuntu-latest
    environment: review-cleanup
    concurrency: {group: review-environment-global, queue: max, cancel-in-progress: false}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: "${{ github.sha }}"
          persist-credentials: false
      - name: Require the protected default branch workflow
        env: {DEFAULT_BRANCH: "${{ github.event.repository.default_branch }}"}
        run: test "$GITHUB_REF" = "refs/heads/$DEFAULT_BRANCH"
      - name: Delete closed, unlabelled, or expired owned reviews
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          ENVIRONMENT_ID: ${{ secrets.DOKPLOY_ENVIRONMENT_ID }}
          DNS_SUFFIX: ${{ vars.BUILDHOUND_REVIEW_DNS_SUFFIX }}
          TTL_HOURS: ${{ vars.BUILDHOUND_REVIEW_TTL_HOURS }}
        run: |
          : "${TTL_HOURS:?BUILDHOUND_REVIEW_TTL_HOURS must be set}"
          deploy/dokploy/reconcile-reviews.sh
