name: Publish Gradle plugin

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: SemVer to publish (for example, 0.1.0 or v0.1.0)
        required: true
        type: string

permissions:
  actions: read
  contents: read

# Plugin Portal versions are immutable. Serialize releases and never cancel an
# in-flight publication when another release is queued.
concurrency:
  group: publish-gradle-plugin
  cancel-in-progress: false
  queue: max

jobs:
  validate:
    name: Validate Gradle plugin release
    # workflow_dispatch lets callers select a ref. Only the default branch is trusted;
    # environment deployment-ref rules provide the non-bypassable companion control.
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      # The publish job's Environment declaration is only effective when repository-side
      # protection remains configured. Fail before release validation if it drifts.
      - name: Verify publication environment protections
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_POLICY: '*.*.*'
        run: |
          set -euo pipefail
          environment="$(
            gh api \
              --method GET \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/environments/gradle-plugin-portal"
          )"

          if ! jq -e '
            any(
              .protection_rules[]?;
              .type == "required_reviewers" and
              .prevent_self_review == true and
              (.reviewers | length) > 0
            )
          ' <<<"$environment" >/dev/null; then
            echo "gradle-plugin-portal must require at least one non-self reviewer." >&2
            exit 1
          fi

          if ! jq -e '.can_admins_bypass == false' <<<"$environment" >/dev/null; then
            echo "Disable 'Allow administrators to bypass configured protection rules' for gradle-plugin-portal." >&2
            exit 1
          fi

          if ! jq -e '
            any(.protection_rules[]?; .type == "branch_policy") and
            .deployment_branch_policy.protected_branches == false and
            .deployment_branch_policy.custom_branch_policies == true
          ' <<<"$environment" >/dev/null; then
            echo "gradle-plugin-portal must use 'Selected branches and tags'; protected-branches-only rejects release tags." >&2
            exit 1
          fi

          policies="$(
            gh api \
              --method GET \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$GITHUB_REPOSITORY/environments/gradle-plugin-portal/deployment-branch-policies?per_page=100"
          )"

          if ! jq -e --arg branch "$DEFAULT_BRANCH" --arg pattern "$RELEASE_TAG_POLICY" '
            .total_count == 2 and
            (.branch_policies | length) == 2 and
            any(.branch_policies[]?; .type == "branch" and .name == $branch) and
            any(.branch_policies[]?; .type == "tag" and .name == $pattern)
          ' <<<"$policies" >/dev/null; then
            echo "gradle-plugin-portal must allow exactly branch '$DEFAULT_BRANCH' and tag '$RELEASE_TAG_POLICY'." >&2
            exit 1
          fi

      # A release tag must resolve to a commit already reviewed on the default branch.
      # This also rejects a manual run whose event metadata is ever inconsistent with the job guard.
      - name: Verify trusted source
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git check-ref-format --branch "$DEFAULT_BRANCH" >/dev/null
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "refs/remotes/origin/$DEFAULT_BRANCH"; then
            echo "Release commit must be contained in $DEFAULT_BRANCH." >&2
            exit 1
          fi

      # The Portal metadata links to buildhound.dev. Keep this credential-free gate ahead of
      # validation and the protected publish job so an invalid certificate can never ship.
      - name: Verify public plugin website
        shell: bash
        run: |
          set -euo pipefail
          status="$(
            curl --silent --show-error \
              --proto '=https' \
              --connect-timeout 5 \
              --max-time 10 \
              --retry 2 \
              --retry-all-errors \
              --retry-delay 2 \
              --retry-max-time 34 \
              --output /dev/null \
              --write-out '%{http_code}' \
              https://buildhound.dev/
          )"
          if [[ ! "$status" =~ ^2[0-9]{2}$ ]]; then
            echo "buildhound.dev returned HTTP $status; refusing Portal upload." >&2
            exit 1
          fi

      # Event values enter the shell through the environment, never by direct
      # expression interpolation. The SemVer check also makes GITHUB_ENV safe.
      - name: Resolve release version
        id: release-version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          MANUAL_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          case "$GITHUB_EVENT_NAME" in
            release) raw_version="$RELEASE_TAG" ;;
            workflow_dispatch) raw_version="$MANUAL_VERSION" ;;
            *)
              echo "Unsupported event: $GITHUB_EVENT_NAME" >&2
              exit 1
              ;;
          esac

          version="${raw_version#v}"
          semver_pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if [[ ! "$version" =~ $semver_pattern ]]; then
            echo "Release version must be valid SemVer: $raw_version" >&2
            exit 1
          fi
          if [[ "$version" =~ [Ss][Nn][Aa][Pp][Ss][Hh][Oo][Tt] ]]; then
            echo "SNAPSHOT versions cannot be published to the Gradle Plugin Portal." >&2
            exit 1
          fi

          printf 'BUILDHOUND_VERSION=%s\n' "$version" >> "$GITHUB_ENV"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Check plugin
        run: ./gradlew :buildhound-gradle-plugin:check

      - name: Validate publication
        run: ./gradlew publishPlugins --validate-only

  publish:
    name: Publish to Gradle Plugin Portal
    needs: validate
    runs-on: ubuntu-latest
    # Configure this Environment with required non-self review and selected protected
    # branch/tag deployment rules before adding either Portal credential.
    environment: gradle-plugin-portal
    env:
      BUILDHOUND_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      # Pin both the source commit and every action: the Portal version is immutable and
      # setup actions execute before the credential-bearing Gradle process.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 26

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      # Environment approval can take time. Recheck after approval and immediately before the
      # secret-scoped step; publishPlugins also enforces the same gate for local/CI uploads.
      - name: Recheck public plugin website
        shell: bash
        run: |
          set -euo pipefail
          status="$(
            curl --silent --show-error \
              --proto '=https' \
              --connect-timeout 5 \
              --max-time 10 \
              --retry 2 \
              --retry-all-errors \
              --retry-delay 2 \
              --retry-max-time 34 \
              --output /dev/null \
              --write-out '%{http_code}' \
              https://buildhound.dev/
          )"
          if [[ ! "$status" =~ ^2[0-9]{2}$ ]]; then
            echo "buildhound.dev returned HTTP $status; refusing Portal upload." >&2
            exit 1
          fi

      # Keep Portal credentials out of checkout, setup, checks, and validation.
      - name: Publish plugin
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$GRADLE_PUBLISH_KEY" || -z "$GRADLE_PUBLISH_SECRET" ]]; then
            echo "Both Gradle Plugin Portal secrets must be configured." >&2
            exit 1
          fi
          ./gradlew publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
